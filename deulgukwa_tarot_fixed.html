  ...Array.from({length:7}, (_,i) => ({id:i,     kr:"바보",  meaning:"새로운 시작, 순수함, 모험",  url:FOOL_URL})),
  ...Array.from({length:8}, (_,i) => ({id:100+i, kr:"달",    meaning:"환상, 불안, 무의식",          url:MOON_URL})),
  ...Array.from({length:7}, (_,i) => ({id:200+i, kr:"타워",  meaning:"붕괴, 각성, 급격한 변화",     url:TOWER_URL})),
];

function shuffle(arr){
  const a = [...arr];
  for(let n = a.length - 1; n > 0; n--){
    const m = Math.floor(Math.random() * (n + 1));
    [a[n], a[m]] = [a[m], a[n]];
  }
  return a;
}

function makeVideo(src){
  const v = document.createElement('video');
  v.src = src; v.muted = true; v.loop = true; v.autoplay = true; v.playsInline = true;
  v.disablePictureInPicture = true;
  v.style.cssText = 'width:100%;height:100%;object-fit:cover;';
  v.play().catch(()=>{});
  return v;
}

function makeBackImg(){
  const img = document.createElement('img');
  img.src = BACK_IMG_URL;
  img.alt = 'card back';
  img.draggable = false;
  return img;
}

// ════════════════════════════════════════════
//  덱
// ════════════════════════════════════════════
let deck = [], selected = [], fadeTimer = null;

function buildDeck(){
  const frame = document.querySelector('.app-frame');
  const fw = frame.offsetWidth;
  const deckEl = document.getElementById('deck-container');
  const dh = deckEl.offsetHeight || fw * 0.5;
  const total = CARD_DATA.length;
  const cardW = Math.min(75, Math.max(44, fw * 0.11));
  const cardH = cardW * (110/75);
  const cols = Math.max(4, Math.min(7, Math.round(fw / (cardW + 10))));
  const rows = Math.ceil(total / cols);
  const colGap = fw / (cols + 0.5);
  const rowGap = Math.min(cardH + 8, (dh * 0.92) / rows);

  return shuffle(CARD_DATA).map((card, idx) => {
    const row = Math.floor(idx / cols), col = idx % cols;
    const x = (col - (cols - 1) / 2) * colGap;
    const y = row * rowGap - ((rows - 1) * rowGap / 2);
    const rotate = (Math.random() * 14 - 7).toFixed(1);
    return { ...card, x, y, rotate, cardW, cardH };
  });
}

function initDeck(){
  deck = buildDeck();
  selected = [];
  const container = document.getElementById('deck-container');
  container.innerHTML = '';
  const cardW = deck[0]?.cardW || 75;
  const cardH = deck[0]?.cardH || 110;
  const mw = Math.round(cardW / 2);
  const mh = Math.round(cardH / 2);

  deck.forEach((card, idx) => {
    const el = document.createElement('div');
    el.className = 'card-slot';
    el.dataset.id = card.id;
    el.style.cssText =
      `--tx:${card.x}px;--ty:${card.y}px;--rot:${card.rotate}deg;--si:${(idx%5)*0.4}s;` +
      `width:${cardW}px;height:${cardH}px;` +
      `left:50%;top:50%;margin-left:-${mw}px;margin-top:-${mh}px;` +
      `transform:translate(${card.x}px,${card.y}px) rotate(${card.rotate}deg);` +
      `opacity:0;z-index:${idx};`;
    el.appendChild(makeBackImg());
    el.addEventListener('click', () => toggleSelect(card.id));
    container.appendChild(el);
  });

  let cnt = 0;
  clearInterval(fadeTimer);
  fadeTimer = setInterval(() => {
    if(cnt < deck.length){
      container.children[cnt].style.opacity = '1';
      cnt++;
    } else {
      clearInterval(fadeTimer);
    }
  }, 80);

  updatePickStatus(0);
}

function updatePickStatus(count){
  const el = document.getElementById('pick-status');
  if(count >= 3){
    el.textContent = '3 장 선 택 완 료';
    el.style.border = '1px solid #a78bfa';
    el.style.boxShadow = '0 0 10px 2px #a78bfa, 0 0 30px 8px #a78bfa55, 0 0 60px 15px #a78bfa33, inset 0 0 10px #a78bfa33';
  } else {
    el.textContent = `카드를 ${3 - count}장 더 고르세요`;
    el.style.border = '1px solid #a78bfa33';
    el.style.boxShadow = 'none';
  }
}

function toggleSelect(id){
  playCardSound();
  if(selected.includes(id)) selected = selected.filter(s => s !== id);
  else if(selected.length < 3) selected.push(id);
  updateUI();
}

function updateUI(){
  const container = document.getElementById('deck-container');
  const cardW = deck[0]?.cardW || 75;
  const cardH = deck[0]?.cardH || 110;
  const mw = Math.round(cardW / 2);
  const mh = Math.round(cardH / 2);

  Array.from(container.children).forEach(el => {
    const id = parseInt(el.dataset.id);
    const card = deck.find(c => c.id === id);
    const isSel = selected.includes(id);
    el.className = 'card-slot' + (isSel ? ' sel' : '');
    el.style.cssText =
      `--tx:${card.x}px;--ty:${card.y}px;--rot:${card.rotate}deg;` +
      `width:${cardW}px;height:${cardH}px;` +
      `left:50%;top:50%;margin-left:-${mw}px;margin-top:-${mh}px;` +
      `transform:translate(${card.x}px,${card.y}px) rotate(${card.rotate}deg);` +
      `opacity:1;z-index:${isSel ? 300 : deck.indexOf(card)};`;
  });

  updatePickStatus(selected.length);

  const slots = document.querySelectorAll('.preview-slot');
  slots.forEach((slot, idx) => {
    const cardId = selected[idx];
    slot.innerHTML = '';
    if(cardId != null){
      const card = deck.find(c => c.id === cardId);
      slot.classList.add('filled');
      slot.style.background = 'transparent';
      slot.appendChild(makeVideo(card.url));
    } else {
      slot.classList.remove('filled');
      slot.style.border = '1px dashed #a78bfa33';
      slot.style.background = '#0a001a';
      slot.innerHTML = '<span style="font-size:16px;color:#a78bfa33;">✦</span>';
    }
  });

  document.getElementById('confirm-btn').disabled = selected.length < 3;
}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

async function handleConfirm(){
  showScreen('result');
  const chosenCards = selected.map(id => deck.find(c => c.id === id));

  const resultCards = document.getElementById('result-cards');
  resultCards.innerHTML = '';
  chosenCards.forEach((card, idx) => {
    const div = document.createElement('div');
    div.className = 'rv-card fade-in';
    div.style.animationDelay = `${idx * 0.2}s`;
    div.appendChild(makeVideo(card.url));
    resultCards.appendChild(div);
  });

  const readingEl = document.getElementById('ai-reading');
  readingEl.innerHTML = [100, 80, 90, 70, 85, 60, 75].map(w => `<div class="shimmer" style="width:${w}%"></div>`).join('');

  const prompt = `당신은 신비로운 타로 리더입니다. 다음 3장의 카드로 과거-현재-미래를 한국어로 따뜻하고 시적으로 해석해주세요.

과거: ${chosenCards[0]?.kr} - ${chosenCards[0]?.meaning}
현재: ${chosenCards[1]?.kr} - ${chosenCards[1]?.meaning}
미래: ${chosenCards[2]?.kr} - ${chosenCards[2]?.meaning}

각 카드마다 📍과거/현재/미래 제목 붙이고 2~3문장. 마지막에 ✨전체 흐름 한 문단. 반말로 친근하게.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.map(b => b.text || '').join('') || '해석을 불러오지 못했어요.';

    readingEl.style.cssText = "font-family:'Noto Serif KR',serif;font-size:clamp(13px,1.8vw,16px);line-height:1.9;color:#ffffff;";
    const html = text
      .replace(/\*\*(.+?)\*\*/g, '<strong style="color:#e9d5ff">$1</strong>')
      .replace(/^---$/gm, '<hr style="border:none;border-top:1px solid #7c3aed55;margin:12px 0;">')
      .replace(/\n/g, '<br>');
    readingEl.innerHTML = html;
  } catch(err){
    readingEl.style.color = '#ffffff';
    readingEl.textContent = '에러: ' + err.message;
  }
}

document.getElementById('door-btn').addEventListener('click', () => {
  playBtnSound();
  showScreen('intro');
  const v = document.getElementById('intro-video');
  v.muted = false;
  const p = v.play();
  if(p && p.catch){
    p.catch(() => {
      v.muted = true;
      v.play().catch(()=>{});

      if(soundBtn) soundBtn.textContent = '🔇';

});

// 문 버튼 위치 계산
const DOOR_POS = { cx: 0.49, cy: 0.79, w: 0.22, h: 0.19 };
const VIDEO_RATIO = 9 / 16;

function positionDoorBtn(){
  const screen = document.getElementById('screen-start');
  const btn = document.getElementById('door-btn');
  if(!screen || !btn) return;

  const sw = screen.offsetWidth;
  const sh = screen.offsetHeight;
  const screenRatio = sw / sh;

  let vw, vh, vx, vy;
  if(screenRatio > VIDEO_RATIO){
    vw = sw; vh = sw / VIDEO_RATIO; vx = 0; vy = (sh - vh) / 2;
  } else {
    vh = sh; vw = sh * VIDEO_RATIO; vy = 0; vx = (sw - vw) / 2;
  }

  const btnW = vw * DOOR_POS.w;
  const btnH = vh * DOOR_POS.h;
  btn.style.left = (vx + vw * DOOR_POS.cx - btnW / 2) + 'px';
  btn.style.top  = (vy + vh * DOOR_POS.cy - btnH / 2) + 'px';
  btn.style.width  = btnW + 'px';
  btn.style.height = btnH + 'px';
}

// notice 화면 393×852 캔버스 스케일링 (프레임과 동일 비율이므로 단순 스케일)
function scaleNoticeStage(){
  const frame = document.querySelector('.app-frame');
  const stage = document.getElementById('notice-stage');
  if(!frame || !stage) return;
  const fw = frame.offsetWidth;
  const scale = fw / 393;
  stage.style.transform = `scale(${scale})`;
}

window.addEventListener('load', () => {
  positionDoorBtn();
  scaleNoticeStage();
});
window.addEventListener('resize', () => {
  positionDoorBtn();
  scaleNoticeStage();
});
document.getElementById('start-video').addEventListener('loadedmetadata', positionDoorBtn);
positionDoorBtn();
scaleNoticeStage();

document.getElementById('intro-video').addEventListener('ended', () => {
  showScreen('notice');
  scaleNoticeStage();
});

document.getElementById('skip-btn').addEventListener('click', () => {
  document.getElementById('intro-video').pause();
  showScreen('notice');
  scaleNoticeStage();
});

// DRAW → 카드 선택 화면
document.getElementById('draw-btn').addEventListener('click', () => {
  playBtnSound();
  showScreen('pick');
  initDeck();
});

document.getElementById('confirm-btn').addEventListener('click', () => {
  playBtnSound();
  handleConfirm();
});

document.getElementById('reset-btn').addEventListener('click', () => {
  playBtnSound();
  selected = [];
  document.querySelectorAll('.preview-slot').forEach(el => {
    el.innerHTML = '✦';
    el.classList.remove('filled');
  });
  showScreen('pick');
  initDeck();
});

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if(document.getElementById('screen-pick').classList.contains('active')) initDeck();
  }, 200);
});
</script>
