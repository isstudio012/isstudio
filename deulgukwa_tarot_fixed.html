<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>들국화 타로</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body { background: #000; overflow: hidden; position: fixed; width: 100%; height: 100%; }

  #root {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  /* ── 9:16 외부 보라색 테두리 컨테이너 (정밀 수정) ── */
  .app-frame {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #000;
    border: 2px solid #c4b5fd; /* 테두리 강조 */
    overflow: hidden;
    color: #c4b5fd;
    /* 9:16 비율 엄수 */
    aspect-ratio: 9 / 16;
    height: 96vh; 
    width: auto;
    max-width: 98vw;
    box-shadow: 0 0 20px rgba(196, 181, 253, 0.2);
  }

  .screen {
    display: none;
    position: absolute;
    inset: 0;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }
  .screen.active { display: flex; }

  #screen-start {
    z-index: 1000;
    background: radial-gradient(circle, #1a0b2e 0%, #000 80%);
    justify-content: center;
  }

  /* ── 카드 레이아웃 수정 (빨간색 박스 영역에 맞춤) ── */
  .card-slot {
    position: absolute; 
    width: 58px; /* 카드 폭 축소 */
    height: 85px; /* 카드 높이 축소 */
    border-radius: 4px; 
    overflow: hidden; 
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s;
    touch-action: manipulation;
  }
  .card-slot.sel {
    transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(1.2) !important;
    box-shadow: 0 0 15px #a78bfa;
    z-index: 500 !important;
  }

  .btn-main {
    background: transparent;
    border: 1.5px solid #a78bfa;
    border-radius: 50px;
    padding: 12px 30px; color: #a78bfa;
    font-family: 'Cinzel', serif; font-size: 14px; letter-spacing: 2px;
    cursor: pointer; transition: all 0.2s;
    touch-action: manipulation;
  }
  .btn-main:active { background: #a78bfa44; transform: scale(0.95); }

  .preview-slot {
    width: 75px; height: 110px; 
    border: 1px dashed #a78bfa33; border-radius: 6px;
    background: #0a001a; display: flex; align-items: center; justify-content: center;
  }
  .preview-slot.filled { border: 1px solid #a78bfa; box-shadow: 0 0 10px #a78bfa55; }

  .logo-header { padding-top: 20px; text-align: center; }
  .logo-header img { width: 120px; height: auto; margin-bottom: 5px; }

  #pick-status {
    background: #0d001a; border: 1px solid #a78bfa33; border-radius: 8px;
    padding: 6px 15px; margin: 10px 0; font-family: 'Noto Serif KR';
    font-size: 16px; color: #fff;
  }
</style>
</head>
<body>

<div id="root">
  <div class="app-frame">
    <div id="screen-start" class="screen active">
      <div style="text-align: center; margin-bottom: 40px;">
        <div style="font-family:'Cinzel'; font-size: 24px; color:#a78bfa; letter-spacing:4px;">TAROT</div>
        <div style="font-family:'Cinzel'; font-size: 11px; color:#7c5cbf; letter-spacing:5px;">DEULGUKWA</div>
      </div>
      <button id="start-btn" class="btn-main">운명의 카드 보기</button>
    </div>

    <div id="screen-intro" class="screen" style="justify-content:center;">
      <video id="intro-video" src="https://res.cloudinary.com/dla7g4hwb/video/upload/v1776217057/%EC%9D%B8%ED%8A%B8%EB%A1%9C_w0smg5.mp4" playsinline style="width:100%;height:100%;object-fit:contain;"></video>
      <div style="position:absolute;bottom:20px;right:15px;">
        <button id="skip-btn" style="background:#00000066;border:1px solid #a78bfa;color:#fff;border-radius:20px;padding:5px 15px;font-size:11px;">SKIP ▶</button>
      </div>
    </div>

    <div id="screen-pick" class="screen">
      <div class="logo-header">
        <img src="https://res.cloudinary.com/dla7g4hwb/image/upload/v1776220791/LOGO2_ofb84j.png" alt="logo">
      </div>
      <p style="font-family:'Noto Serif KR'; font-size:16px; color:#ccccff;">무의식이 선택하는 세 장의 카드</p>
      <div id="pick-status">카드를 3장 고르세요</div>
      
      <div style="position:relative; flex:1; width:100%; overflow:hidden;">
        <div id="deck-container" style="position:absolute; inset:0;"></div>
      </div>

      <div id="chosen-preview" style="display:flex; gap:10px; padding:15px; justify-content:center;">
        <div class="preview-slot">✦</div>
        <div class="preview-slot">✦</div>
        <div class="preview-slot">✦</div>
      </div>
      <div style="padding-bottom:30px;">
        <button id="confirm-btn" class="btn-main" disabled>리딩 시작</button>
      </div>
    </div>

    <div id="screen-result" class="screen" style="overflow-y:auto;">
        <div id="result-content" style="padding:20px 15px; width:100%;">
            <div id="result-cards" style="display:flex; gap:8px; margin-bottom:20px; justify-content:center;"></div>
            <div id="ai-reading" style="background:#080010; border:1px solid #a78bfa33; border-radius:12px; padding:15px; font-size:13px; line-height:1.8; color:#c4b5fd;"></div>
            <div style="text-align:center; margin-top:20px; padding-bottom:30px;">
                <button id="reset-btn" class="btn-main">다시 뽑기</button>
            </div>
        </div>
    </div>
  </div>
</div>

<script>
const BACK_URL = "https://res.cloudinary.com/dla7g4hwb/video/upload/v1776217870/%EB%92%B7%EB%B3%80_%EC%B9%B4%EB%93%9C_-00005_jvjkc2.mp4";
const CARD_DATA = [
  {id:1, kr:"바보", url:"https://res.cloudinary.com/dla7g4hwb/video/upload/v1776217052/%EB%B0%94%EB%B3%B4_qevz75.mp4"},
  {id:2, kr:"달", url:"https://res.cloudinary.com/dla7g4hwb/video/upload/v1776219434/MOON_oqihp1.mp4"},
  {id:3, kr:"타워", url:"https://res.cloudinary.com/dla7g4hwb/video/upload/v1776219434/tower_yhjkax.mp4"}
];

let selected = [];

function initDeck() {
  const container = document.getElementById('deck-container');
  container.innerHTML = '';
  selected = [];
  
  // 6열로 배치하여 빨간 박스 가로폭에 맞춤
  const cols = 6;
  for(let i=0; i<21; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    
    // 간격 조절: 가로 52px, 세로 88px (빨간 박스 안으로 밀집)
    const tx = (col - (cols-1)/2) * 52; 
    const ty = (row - 1.5) * 88 - 10;
    const rot = Math.random() * 10 - 5;

    const el = document.createElement('div');
    el.className = 'card-slot';
    el.innerHTML = `<video src="${BACK_URL}" muted loop autoplay playsinline style="width:100%;height:100%;object-fit:cover;"></video>`;
    el.style.left = '50%'; el.style.top = '50%';
    el.style.marginLeft = '-29px'; el.style.marginTop = '-42px';
    el.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;
    el.dataset.id = i;
    
    el.onclick = () => {
      if(selected.includes(i)) {
        selected = selected.filter(id => id !== i);
        el.classList.remove('sel');
      } else if(selected.length < 3) {
        selected.push(i);
        el.classList.add('sel');
      }
      updateUI();
    };
    container.appendChild(el);
  }
}

function updateUI() {
  const slots = document.querySelectorAll('.preview-slot');
  slots.forEach((slot, idx) => {
    slot.innerHTML = selected[idx] !== undefined ? `<video src="${BACK_URL}" muted loop autoplay playsinline style="width:100%;height:100%;object-fit:cover;"></video>` : '✦';
    selected[idx] !== undefined ? slot.classList.add('filled') : slot.classList.remove('filled');
  });
  document.getElementById('pick-status').textContent = selected.length === 3 ? '3장 선택 완료!' : `카드를 ${3-selected.length}장 더 고르세요`;
  document.getElementById('confirm-btn').disabled = selected.length < 3;
}

// 시작 버튼 이벤트 (모바일 반응성 강화)
document.getElementById('start-btn').addEventListener('click', function() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-intro').classList.add('active');
  const v = document.getElementById('intro-video');
  v.play();
});

document.getElementById('skip-btn').onclick = () => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-pick').classList.add('active');
  initDeck();
};

document.getElementById('intro-video').onended = () => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-pick').classList.add('active');
  initDeck();
};

document.getElementById('confirm-btn').onclick = () => {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-result').classList.add('active');
    const resDiv = document.getElementById('result-cards');
    resDiv.innerHTML = '';
    [0,1,2].forEach(i => {
        const c = document.createElement('div');
        c.className = 'preview-slot filled';
        c.innerHTML = `<video src="${CARD_DATA[i].url}" muted loop autoplay playsinline style="width:100%;height:100%;object-fit:cover;"></video>`;
        resDiv.appendChild(c);
    });
    document.getElementById('ai-reading').textContent = "신비로운 무의식의 메시지를 읽고 있습니다...";
};

document.getElementById('reset-btn').onclick = () => location.reload();
</script>
</body>
</html>
