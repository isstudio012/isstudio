<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;400&family=Abhaya+Libre:wght@800&family=Lisu+Bosa&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── 카드 흔들림 애니메이션 ── */
  @keyframes sway {
    0%,100% { transform: translate(var(--tx),var(--ty)) rotate(calc(var(--rot) - 1.5deg)); }
    50%      { transform: translate(var(--tx),var(--ty)) rotate(calc(var(--rot) + 1.5deg)); }
  }
  .card-slot:not(.sel):hover {
    transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(1.1) !important;
    outline: 2px solid #ccccff;
    outline-offset: -2px;
    animation-play-state: paused;
  }
  .card-slot:not(.sel) { animation: sway calc(3s + var(--si, 0s)) ease-in-out infinite; }
  .card-slot { transition: transform 0.25s; }

  /* ── 선택된 카드 미리보기 슬롯 발광 효과 ── */
  .preview-slot.filled {
    border: 1px solid #a78bfa !important;
    box-shadow:
      0 0 10px 2px #a78bfa,
      0 0 30px 8px #a78bfa55,
      0 0 60px 15px #a78bfa33,
      inset 0 0 10px #a78bfa33;
  }

  #root { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; }

  /* ── 393×852 고정 프레임 ── */
  .app-frame {
    position: relative;
    display: flex; flex-direction: column; align-items: center;
    background: #000; overflow: hidden; color: #c4b5fd;
    width: 393px;
    height: 852px;
    max-width: 100vw;
    max-height: 100vh;
  }

  /* ── 화면 전환 ── */
  .screen {
    display: none; position: absolute; inset: 0;
    flex-direction: column; align-items: center; overflow: hidden;
  }
  .screen.active { display: flex; }

  /* ── 메인(시작) 화면: 배경 영상 + 문 클릭 버튼 ── */
  #screen-start {
    z-index: 1000;
    background: #000;
    justify-content: center;
    padding: 0;
  }
  #start-video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }
  /* 문 중앙의 투명 클릭 영역 (hover 시 발광) - 위치/크기는 JS로 동적 설정 */
  #door-btn {
    position: absolute;
    border-radius: 8px;
    cursor: pointer;
    background: radial-gradient(ellipse at center, rgba(255,240,200,0) 0%, rgba(255,240,200,0) 100%);
    transition: background 0.4s ease, box-shadow 0.4s ease;
    z-index: 10;
  }
  #door-btn:hover {
    background: radial-gradient(ellipse at center, rgba(255,235,180,0.45) 0%, rgba(255,220,150,0.15) 60%, rgba(255,220,150,0) 100%);
    box-shadow:
      0 0 30px 10px rgba(255,230,170,0.35),
      0 0 60px 20px rgba(255,220,150,0.2);
  }

  /* ── 결과 화면 스크롤 ── */
  #screen-result.active { overflow-y: auto; }

  /* ══════════════════════════════════════════
     주의사항/질문 입력 페이지 (피그마 디자인 기반)
     393×852 고정 좌표
     ══════════════════════════════════════════ */
  #screen-notice {
    background: #ebdfd1;
    padding: 0;
    justify-content: flex-start;
    align-items: center;
  }

    position: relative;
    width: 393px;
    height: 852px;

  /* 흰색 박스 (하단) */
  .notice-white-box {
    position: absolute;
    left: 15px;
    top: 535px;
    width: 362px;

    border: 1px solid #c5c5c5;
    border-radius: 10px;

  /* DRAW 버튼 */
  #draw-btn {

    left: 152px;

  /* ── 카드 슬롯 (덱) ── */
  .card-slot {
    position: absolute;
    width: clamp(48px, 8vw, 75px);
    height: clamp(70px, 11.7vw, 110px);
    border-radius: 3px; overflow: hidden; cursor: pointer;

  .card-slot:hover { filter: brightness(1.3); }
  .card-slot.sel {

  /* ── 버튼 ── */

  .btn-main:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  /* ── 로딩 shimmer 및 페이드인 ── */
  .shimmer {
    background: linear-gradient(90deg, #0a0010 25%, #2d1a5e 50%, #0a0010 75%);

  }
  @keyframes sh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .fade-in { animation: fi 0.7s ease forwards; }
  @keyframes fi { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  /* ── 결과 화면 카드 ── */

<script>
// ════════════════════════════════════════════
//  효과음 (Cloudinary URL 로드 - 경량화)
// ════════════════════════════════════════════
const SOUND_AA_URL = "https://res.cloudinary.com/dla7g4hwb/video/upload/v1776415549/AA_rqd7b9.mp3"; // 카드 선택음
const SOUND_BB_URL = "https://res.cloudinary.com/dla7g4hwb/video/upload/v1776415549/BB_y1lav2.mp3"; // 버튼 클릭음

// 오디오 객체 풀링: 재생 중에도 빠르게 다시 재생 가능하도록 2개씩 준비
const audioAA = [new Audio(SOUND_AA_URL), new Audio(SOUND_AA_URL)];
const audioBB = [new Audio(SOUND_BB_URL), new Audio(SOUND_BB_URL)];
audioAA.forEach(a => a.volume = 0.4);
audioBB.forEach(a => a.volume = 0.08);
let aaIdx = 0, bbIdx = 0;

function playCardSound(){
  // 3장 이미 선택한 상태에서는 재생 안 함
  if(selected.length >= 3) return;
  try {
    const a = audioAA[aaIdx];
    a.currentTime = 0;
    a.play().catch(()=>{});
    aaIdx = (aaIdx + 1) % audioAA.length;
  } catch(e) {}
}
function playBtnSound(){
  try {
    const a = audioBB[bbIdx];
    a.currentTime = 0;
    a.play().catch(()=>{});
    bbIdx = (bbIdx + 1) % audioBB.length;
  } catch(e) {}
}

// ════════════════════════════════════════════
//  미디어 URL 정의
// ════════════════════════════════════════════
const BACK_IMG_URL = "https://res.cloudinary.com/dla7g4hwb/image/upload/v1776350552/1776350465030_cb33w9.jpg"; // 카드 뒷면 (이미지)

const FOOL_URL  = "https://res.cloudinary.com/dla7g4hwb/video/upload/q_100/v1776217052/%EB%B0%94%EB%B3%B4_qevz75.mp4";
const MOON_URL  = "https://res.cloudinary.com/dla7g4hwb/video/upload/q_100/v1776219434/MOON_oqihp1.mp4";
const TOWER_URL = "https://res.cloudinary.com/dla7g4hwb/video/upload/q_100/v1776219434/tower_yhjkax.mp4";

// ════════════════════════════════════════════
//  카드 데이터 (바보 7장 + 달 8장 + 타워 7장 = 22장)
// ════════════════════════════════════════════
const CARD_DATA = [
  ...Array.from({length:7}, (_,i) => ({id:i,     kr:"바보",  meaning:"새로운 시작, 순수함, 모험",  url:FOOL_URL})),
  ...Array.from({length:8}, (_,i) => ({id:100+i, kr:"달",    meaning:"환상, 불안, 무의식",          url:MOON_URL})),
  ...Array.from({length:7}, (_,i) => ({id:200+i, kr:"타워",  meaning:"붕괴, 각성, 급격한 변화",     url:TOWER_URL})),
];

// ════════════════════════════════════════════
//  유틸 함수
// ════════════════════════════════════════════
function shuffle(arr){
  const a = [...arr];
  for(let n = a.length - 1; n > 0; n--){
    const m = Math.floor(Math.random() * (n + 1));
    [a[n], a[m]] = [a[m], a[n]];
  }
  return a;
}

// 카드 앞면 영상 엘리먼트 생성 (무음, 자동재생, 반복)
function makeVideo(src){
  const v = document.createElement('video');
  v.src = src; v.muted = true; v.loop = true; v.autoplay = true; v.playsInline = true;
  v.disablePictureInPicture = true;
  v.style.cssText = 'width:100%;height:100%;object-fit:cover;';
  v.play().catch(()=>{});
  return v;
}

// 카드 뒷면 이미지 엘리먼트 생성
function makeBackImg(){
  const img = document.createElement('img');
  img.src = BACK_IMG_URL;
  img.alt = 'card back';
  img.draggable = false;
  return img;
}

// ════════════════════════════════════════════
//  덱 레이아웃 계산 및 초기화
// ════════════════════════════════════════════
let deck = [], selected = [], fadeTimer = null;

function buildDeck(){
  const frame = document.querySelector('.app-frame');
  const fw = frame.offsetWidth;
  const deckEl = document.getElementById('deck-container');
  const dh = deckEl.offsetHeight || fw * 0.5;
  const total = CARD_DATA.length;
  const cardW = Math.min(75, Math.max(44, fw * 0.11));
  const cardH = cardW * (110/75);
  const cols = Math.max(4, Math.min(7, Math.round(fw / (cardW + 10))));
  const rows = Math.ceil(total / cols);
  const colGap = fw / (cols + 0.5);
  const rowGap = Math.min(cardH + 8, (dh * 0.92) / rows);

  return shuffle(CARD_DATA).map((card, idx) => {
    const row = Math.floor(idx / cols), col = idx % cols;
    const x = (col - (cols - 1) / 2) * colGap;
    const y = row * rowGap - ((rows - 1) * rowGap / 2);
    const rotate = (Math.random() * 14 - 7).toFixed(1);
    return { ...card, x, y, rotate, cardW, cardH };
  });
}

function initDeck(){
  deck = buildDeck();
  selected = [];
  const container = document.getElementById('deck-container');
  container.innerHTML = '';
  const cardW = deck[0]?.cardW || 75;
  const cardH = deck[0]?.cardH || 110;
  const mw = Math.round(cardW / 2);
  const mh = Math.round(cardH / 2);

  deck.forEach((card, idx) => {
    const el = document.createElement('div');
    el.className = 'card-slot';
    el.dataset.id = card.id;
    el.style.cssText =
      `--tx:${card.x}px;--ty:${card.y}px;--rot:${card.rotate}deg;--si:${(idx%5)*0.4}s;` +
      `width:${cardW}px;height:${cardH}px;` +
      `left:50%;top:50%;margin-left:-${mw}px;margin-top:-${mh}px;` +
      `transform:translate(${card.x}px,${card.y}px) rotate(${card.rotate}deg);` +
      `opacity:0;z-index:${idx};`;
    el.appendChild(makeBackImg()); // 뒷면: 이미지 사용 (가벼움)
    el.addEventListener('click', () => toggleSelect(card.id));
    container.appendChild(el);
  });

  // 카드 순차 페이드인
  let cnt = 0;
  clearInterval(fadeTimer);
  fadeTimer = setInterval(() => {
    if(cnt < deck.length){
      container.children[cnt].style.opacity = '1';
      cnt++;
    } else {
      clearInterval(fadeTimer);
    }
  }, 80);

  updatePickStatus(0);
}

// ════════════════════════════════════════════
//  카드 선택/해제
// ════════════════════════════════════════════
function updatePickStatus(count){
  const el = document.getElementById('pick-status');
  if(count >= 3){
    el.textContent = '3 장 선 택 완 료';
    el.style.border = '1px solid #a78bfa';
    el.style.boxShadow = '0 0 10px 2px #a78bfa, 0 0 30px 8px #a78bfa55, 0 0 60px 15px #a78bfa33, inset 0 0 10px #a78bfa33';
  } else {
    el.textContent = `카드를 ${3 - count}장 더 고르세요`;
    el.style.border = '1px solid #a78bfa33';
    el.style.boxShadow = 'none';
  }
}

function toggleSelect(id){
  playCardSound();
  if(selected.includes(id)) selected = selected.filter(s => s !== id);
  else if(selected.length < 3) selected.push(id);
  updateUI();
}

function updateUI(){
  const container = document.getElementById('deck-container');
  const cardW = deck[0]?.cardW || 75;
  const cardH = deck[0]?.cardH || 110;
  const mw = Math.round(cardW / 2);
  const mh = Math.round(cardH / 2);

  // 덱 카드들 업데이트 (이미지 DOM은 재활용)
  Array.from(container.children).forEach(el => {
    const id = parseInt(el.dataset.id);
    const card = deck.find(c => c.id === id);
    const isSel = selected.includes(id);
    el.className = 'card-slot' + (isSel ? ' sel' : '');
    el.style.cssText =
      `--tx:${card.x}px;--ty:${card.y}px;--rot:${card.rotate}deg;` +
      `width:${cardW}px;height:${cardH}px;` +
      `left:50%;top:50%;margin-left:-${mw}px;margin-top:-${mh}px;` +
      `transform:translate(${card.x}px,${card.y}px) rotate(${card.rotate}deg);` +
      `opacity:1;z-index:${isSel ? 300 : deck.indexOf(card)};`;
  });

  updatePickStatus(selected.length);

  // 미리보기 슬롯: 선택한 카드의 "앞면 영상" 표시
  const slots = document.querySelectorAll('.preview-slot');
  slots.forEach((slot, idx) => {
    const cardId = selected[idx];
    slot.innerHTML = '';
    if(cardId != null){
      const card = deck.find(c => c.id === cardId);
      slot.classList.add('filled');
      slot.style.background = 'transparent';
      slot.appendChild(makeVideo(card.url)); // 앞면 영상
    } else {
      slot.classList.remove('filled');
      slot.style.border = '1px dashed #a78bfa33';
      slot.style.background = '#0a001a';
      slot.innerHTML = '<span style="font-size:16px;color:#a78bfa33;">✦</span>';
    }
  });

  document.getElementById('confirm-btn').disabled = selected.length < 3;
}

// ════════════════════════════════════════════
//  화면 전환
// ════════════════════════════════════════════
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// ════════════════════════════════════════════
//  AI 리딩 (Claude API)
// ════════════════════════════════════════════
async function handleConfirm(){
  showScreen('result');
  const chosenCards = selected.map(id => deck.find(c => c.id === id));

  // 결과 카드 영상 표시
  const resultCards = document.getElementById('result-cards');
  resultCards.innerHTML = '';
  chosenCards.forEach((card, idx) => {
    const div = document.createElement('div');
    div.className = 'rv-card fade-in';
    div.style.animationDelay = `${idx * 0.2}s`;
    div.appendChild(makeVideo(card.url));
    resultCards.appendChild(div);
  });

  // 로딩 표시
  const readingEl = document.getElementById('ai-reading');
  readingEl.innerHTML = [100, 80, 90, 70, 85, 60, 75].map(w => `<div class="shimmer" style="width:${w}%"></div>`).join('');

  // 프롬프트 생성
  const prompt = `당신은 신비로운 타로 리더입니다. 다음 3장의 카드로 과거-현재-미래를 한국어로 따뜻하고 시적으로 해석해주세요.

과거: ${chosenCards[0]?.kr} - ${chosenCards[0]?.meaning}
현재: ${chosenCards[1]?.kr} - ${chosenCards[1]?.meaning}
미래: ${chosenCards[2]?.kr} - ${chosenCards[2]?.meaning}

각 카드마다 📍과거/현재/미래 제목 붙이고 2~3문장. 마지막에 ✨전체 흐름 한 문단. 반말로 친근하게.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.map(b => b.text || '').join('') || '해석을 불러오지 못했어요.';

    readingEl.style.cssText = "font-family:'Noto Serif KR',serif;font-size:clamp(13px,1.8vw,16px);line-height:1.9;color:#ffffff;";
    // 간단한 마크다운 파싱
    const html = text
      .replace(/\*\*(.+?)\*\*/g, '<strong style="color:#e9d5ff">$1</strong>')
      .replace(/^---$/gm, '<hr style="border:none;border-top:1px solid #7c3aed55;margin:12px 0;">')
      .replace(/\n/g, '<br>');
    readingEl.innerHTML = html;
  } catch(err){
    readingEl.style.color = '#ffffff';
    readingEl.textContent = '에러: ' + err.message;
  }
}

// ════════════════════════════════════════════
//  이벤트 핸들러
// ════════════════════════════════════════════

// 메인 화면: 문 클릭 → 인트로 영상
document.getElementById('door-btn').addEventListener('click', () => {
  playBtnSound();
  showScreen('intro');
  const v = document.getElementById('intro-video');
  // 일부 모바일에선 소리 있는 자동재생이 차단됨 → 먼저 muted로 재생 후 바로 unmute 시도
  v.muted = false;
  const p = v.play();
  if(p && p.catch){
    p.catch(() => {
      // 소리 있는 재생 실패 → muted로 재생 (사용자가 스피커 버튼 누르면 소리 켜짐)
      v.muted = true;
      v.play().catch(()=>{});
      const soundBtn = document.getElementById('sound-btn');
      if(soundBtn) soundBtn.textContent = '🔇';
    });
  }
});

// ════════════════════════════════════════════
//  문 버튼 위치 자동 계산
//  - 영상은 9:16 비율, object-fit:cover로 화면 꽉 채움
//  - 화면 비율에 따라 영상이 잘리는 영역이 달라지므로
//    실제 표시되는 영상 영역 기준으로 문 위치 계산
// ════════════════════════════════════════════
const DOOR_POS = {
  cx: 0.49,
  cy: 0.79,
  w:  0.22,
  h:  0.19
};
const VIDEO_RATIO = 9 / 16; // 영상 원본 비율

function positionDoorBtn(){
  const screen = document.getElementById('screen-start');
  const btn = document.getElementById('door-btn');
  if(!screen || !btn) return;

  const sw = screen.offsetWidth;
  const sh = screen.offsetHeight;
  const screenRatio = sw / sh;

  // object-fit:cover 기준 실제 표시 영상 크기/위치 계산
  let vw, vh, vx, vy;
  if(screenRatio > VIDEO_RATIO){
    // 화면이 영상보다 가로로 넓음 → 영상 가로가 화면 꽉 채움, 위아래 잘림
    vw = sw;
    vh = sw / VIDEO_RATIO;
    vx = 0;
    vy = (sh - vh) / 2;
  } else {
    // 화면이 영상보다 세로로 김 → 영상 세로가 화면 꽉 채움, 양옆 잘림
    vh = sh;
    vw = sh * VIDEO_RATIO;
    vy = 0;
    vx = (sw - vw) / 2;
  }

  // 문 버튼 위치/크기 설정
  const btnW = vw * DOOR_POS.w;
  const btnH = vh * DOOR_POS.h;
  const btnX = vx + vw * DOOR_POS.cx - btnW / 2;
  const btnY = vy + vh * DOOR_POS.cy - btnH / 2;

  btn.style.left   = btnX + 'px';
  btn.style.top    = btnY + 'px';
  btn.style.width  = btnW + 'px';
  btn.style.height = btnH + 'px';
}

// 초기 + 리사이즈 시 위치 재계산
window.addEventListener('load', positionDoorBtn);
window.addEventListener('resize', positionDoorBtn);
// 영상 메타데이터 로드 후에도 재계산 (혹시나)
document.getElementById('start-video').addEventListener('loadedmetadata', positionDoorBtn);
positionDoorBtn();

// 인트로 영상 종료 → 주의사항 화면
document.getElementById('intro-video').addEventListener('ended', () => {
  showScreen('notice');
});

// SKIP 버튼 → 주의사항 화면
document.getElementById('skip-btn').addEventListener('click', () => {
  document.getElementById('intro-video').pause();
  showScreen('notice');
});

// DRAW 버튼 → 카드 선택 화면
document.getElementById('draw-btn').addEventListener('click', () => {
  playBtnSound();
  showScreen('pick');
  initDeck();
});

// 리딩 시작 버튼
document.getElementById('confirm-btn').addEventListener('click', () => {
  playBtnSound();
  handleConfirm();
});

// 다시 뽑기 버튼 → 카드 선택 화면으로
document.getElementById('reset-btn').addEventListener('click', () => {
  playBtnSound();
  selected = [];
  document.querySelectorAll('.preview-slot').forEach(el => {
    el.innerHTML = '✦';
    el.classList.remove('filled');
  });
  showScreen('pick');
  initDeck();
});

// 리사이즈 시 덱 재배치 (카드 선택 화면일 때만)
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if(document.getElementById('screen-pick').classList.contains('active')) initDeck();
  }, 200);
});
</script>
