<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>들국화 타로</title>
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Wildflower Tarot">

<meta property="og:type" content="website">
<meta property="og:title" content="들국화 타로">
<meta property="og:description" content="Your Story, Revealed.">
<meta property="og:image" content="https://res.cloudinary.com/dla7g4hwb/image/upload/v1776350552/1776350465030_cb33w9.jpg">
<meta property="og:image:width" content="1080">
<meta property="og:image:height" content="1920">
<meta property="og:url" content="https://isstudio012.github.io">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+KR:wght@300;400&family=Abhaya+Libre:wght@800&family=Lisu+Bosa&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

  @keyframes sway {
    0%,100% { transform: translate(var(--tx),var(--ty)) rotate(calc(var(--rot) - 1.5deg)); }
    50%      { transform: translate(var(--tx),var(--ty)) rotate(calc(var(--rot) + 1.5deg)); }
  }
  .card-slot:not(.sel):hover {
    transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(1.1) !important;
    outline: 2px solid #ccccff;
    outline-offset: -2px;
    animation-play-state: paused;
  }
  .card-slot:not(.sel) { animation: sway calc(3s + var(--si, 0s)) ease-in-out infinite; }
  .card-slot { transition: transform 0.25s; }

  .preview-slot.filled {
    border: 1px solid #a78bfa !important;
    box-shadow:
      0 0 10px 2px #a78bfa,
      0 0 30px 8px #a78bfa55,
      0 0 60px 15px #a78bfa33,
      inset 0 0 10px #a78bfa33;
  }

  #root {
    position: fixed; inset: 0; background: #000;
    display: flex; align-items: center; justify-content: center;
  }

  /* 393×852 고정 프레임 + 자동 scale 래퍼 */
  .frame-wrapper {
    width: 393px;
    height: 852px;
    transform-origin: center center;
  }
  .app-frame {
    position: relative;
    width: 393px;
    height: 852px;
    background: #000;
    overflow: hidden;
    color: #c4b5fd;
  }

  .screen {
    display: none;
    position: absolute;
    inset: 0;
    width: 393px;
    height: 852px;
    overflow: hidden;
  }
  .screen.active { display: block; }

  /* 1. 시작 화면 */
  #screen-start { z-index: 1000; background: #000; }
  #start-video {
    position: absolute;
    inset: 0;
    width: 393px;
    height: 852px;
    object-fit: cover;
    z-index: 0;
  }
  #door-btn {
    position: absolute;
    border-radius: 8px;
    cursor: pointer;
    background: radial-gradient(ellipse at center, rgba(255,240,200,0) 0%, rgba(255,240,200,0) 100%);
    transition: background 0.4s ease, box-shadow 0.4s ease;
    z-index: 10;
  }
  #door-btn:hover {
    background: radial-gradient(ellipse at center, rgba(255,235,180,0.45) 0%, rgba(255,220,150,0.15) 60%, rgba(255,220,150,0) 100%);
    box-shadow:
      0 0 30px 10px rgba(255,230,170,0.35),
      0 0 60px 20px rgba(255,220,150,0.2);
  }

  /* 2. 인트로 */
  #screen-intro { background: #000; }
  #intro-video {
    position: absolute;
    top: 0; left: 0;
    width: 393px;
    height: 852px;
    object-fit: contain;
  }
  .intro-controls {
    position: absolute;
    bottom: 24px;
    right: 16px;
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  .intro-controls button {
    background: #ffffff22;
    border: 1px solid #a78bfa44;
    color: #fff;
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 12px;
    cursor: pointer;
  }

  /* 3. 주의사항 / 질문 입력 (Cloudinary 배경 이미지) */
  #screen-notice { background: #ebdfd1; }
  .notice-bg {
    position: absolute;
    inset: 0;
    width: 393px;
    height: 852px;
    object-fit: cover;
    z-index: 0;
    user-select: none;
    pointer-events: none;
  }
  /* 위 안내 박스 - 피그마 좌표: left 15, top 107, 292×141 */
  #notice-info-box {
    position: absolute;
    left: 15px;
    top: 107px;
    width: 292px;
    height: 141px;
    padding: 13px;
    background: #EBDFD1;
    border: 1px solid #ffffff;
    border-radius: 10px;
    font-family: 'Times New Roman', serif;
    font-size: 12px;
    color: #000;
    z-index: 2;
  }
  /* 입력창 - 피그마 좌표: left 15, top 339, 360×141 */
  #notice-textarea {
    position: absolute;
    left: 15px;
    top: 339px;
    width: 360px;
    height: 141px;
    padding: 13px;
    background: #EBDFD1;
    border: 1px solid #ffffff;
    border-radius: 10px;
    font-family: 'Times New Roman', serif;
    font-size: 12px;
    color: #000;
    resize: none;
    outline: none;
    z-index: 2;
  }
  #notice-textarea::placeholder { color: #000; }
  /* DRAW - 피그마 좌표: left 157, top 494, 89×28 */
  #draw-btn {
    position: absolute;
    left: 157px;
    top: 494px;
    width: 89px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    cursor: pointer;
    font-family: 'Times New Roman', serif;
    font-size: 24px;
    font-weight: 400;
    letter-spacing: 2px;
    color: #000;
    transition: transform 0.2s ease, text-shadow 0.2s ease;
    z-index: 2;
  }
  #draw-btn:hover {
    transform: scale(1.1);
    text-shadow: 0 0 8px rgba(255,255,255,1), 0 0 16px rgba(255,255,255,0.7);
  }

  /* 4. 카드 선택 (고정 px) */
  #screen-pick { background: #000; }
  .pick-top {
    position: absolute;
    top: 16px;
    left: 0;
    width: 393px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .pick-logo { width: 90px; height: auto; }
  .pick-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 17px;
    color: #ccccff;
    margin: 6px 0 0;
    text-align: center;
  }
  #pick-status {
    background: #0d001a;
    border: 1px solid #a78bfa33;
    border-radius: 10px;
    padding: 5px 18px;
    margin-top: 8px;
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    color: #ffffff;
    text-align: center;
    transition: all 0.4s;
  }
  #deck-container {
    position: absolute;
    top: 180px;
    left: 0;
    width: 393px;
    height: 500px;
    overflow: hidden;
  }
  .pick-bottom {
    position: absolute;
    bottom: 20px;
    left: 0;
    width: 393px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #chosen-preview {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 12px;
  }
  .preview-slot {
    width: 65px;
    height: 95px;
    border: 1px dashed #a78bfa33;
    border-radius: 7px;
    overflow: hidden;
    background: #0a001a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: #a78bfa33;
  }

  .card-slot {
    position: absolute;
    width: 60px;
    height: 88px;
    border-radius: 3px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), box-shadow 0.3s, filter 0.3s;
  }
  .card-slot:hover { filter: brightness(1.3); }
  .card-slot.sel {
    transform: translate(var(--tx), var(--ty)) rotate(var(--rot)) scale(1.35) !important;
    box-shadow: 0 0 0 2px #a78bfa, 0 0 14px #a78bfa99 !important;
    filter: none !important;
    z-index: 300 !important;
  }
  .card-slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .btn-main {
    background: transparent;
    border: 1.5px solid #a78bfa;
    border-radius: 50px;
    padding: 13px 40px;
    color: #a78bfa;
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-main:hover { background: #a78bfa22; transform: scale(1.05); }
  .btn-main:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .shimmer {
    background: linear-gradient(90deg, #0a0010 25%, #2d1a5e 50%, #0a0010 75%);
    background-size: 200% 100%;
    animation: sh 1.4s infinite;
    border-radius: 6px;
    height: 14px;
    margin: 7px 0;
  }
  @keyframes sh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .fade-in { animation: fi 0.7s ease forwards; }
  @keyframes fi { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  /* 5. 결과 */
  #screen-result { background: #000; }
  .result-header {
    position: absolute;
    top: 14px;
    left: 16px;
    width: 361px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .result-header img { width: 90px; height: auto; flex-shrink: 0; }
  .result-header p {
    font-family: 'Noto Serif KR', serif;
    font-size: 22px;
    color: #e9d5ff;
    margin: 0;
  }
  #result-cards {
    position: absolute;
    top: 110px;
    left: 0;
    width: 393px;
    display: flex;
    gap: 20px;
    justify-content: center;
  }
  .rv-card {
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    width: 95px;
    height: 135px;
    border: 1px solid #a78bfa;
    box-shadow:
      0 0 5px 1px #a78bfa,
      0 0 15px 4px #a78bfa44,
      inset 0 0 5px #a78bfa22;
  }
  .result-reading-box {
    position: absolute;
    top: 265px;
    left: 16px;
    width: 361px;
    height: 510px;
    background: #020008;
    border: 1px solid #ffffff;
    padding: 16px 14px;
    overflow-y: auto;
  }
  .result-reading-title {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 3px;
    color: #ffffff;
    margin-bottom: 14px;
    text-align: center;
    font-weight: 700;
  }
  .result-bottom {
    position: absolute;
    bottom: 20px;
    left: 0;
    width: 393px;
    text-align: center;
  }
</style>
</head>
<body>
<div id="root">
  <div class="frame-wrapper">
    <div class="app-frame">

      <!-- 1. 시작 -->
      <div id="screen-start" class="screen active">
        <video id="start-video"
               src="https://res.cloudinary.com/dla7g4hwb/video/upload/v1776429009/%EB%A9%94%EC%9D%B8-001_mbfwlv.mp4"
               autoplay muted loop playsinline></video>
        <div id="door-btn"></div>
      </div>

      <!-- 2. 인트로 -->
      <div id="screen-intro" class="screen">
        <video id="intro-video"
          src="https://res.cloudinary.com/dla7g4hwb/video/upload/q_100/v1776217057/%EC%9D%B8%ED%8A%B8%EB%A1%9C_w0smg5.mp4"
          playsinline></video>
        <div class="intro-controls">
          <button id="sound-btn"
            onclick="var v=document.getElementById('intro-video');v.muted=!v.muted;this.textContent=v.muted?'🔇':'🔊';">🔊</button>
          <button id="skip-btn" style="padding:6px 14px;letter-spacing:1px;">SKIP ▶</button>
        </div>
      </div>

      <!-- 3. 주의사항 (배경이미지 + 위 안내박스 + 입력창 + DRAW) -->
      <div id="screen-notice" class="screen">
        <img class="notice-bg"
             src="https://res.cloudinary.com/dla7g4hwb/image/upload/v1776683957/iPhone_16_-_3_zteppj.png"
             alt="">
        <div id="notice-info-box">"당신의 고민을 들려주세요"</div>
        <textarea id="notice-textarea" placeholder='"당신의 고민을 들려주세요"'></textarea>
        <button id="draw-btn" type="button">DRAW</button>
      </div>

      <!-- 4. 카드 선택 -->
      <div id="screen-pick" class="screen">
        <div class="pick-top">
          <img class="pick-logo"
               src="https://res.cloudinary.com/dla7g4hwb/image/upload/v1776220791/LOGO2_ofb84j.png"
               alt="logo">
          <p class="pick-title">무의식이 선택하는 단 세 장의 카드</p>
          <div id="pick-status">카드를 3장 더 고르세요</div>
        </div>
        <div id="deck-container"></div>
        <div class="pick-bottom">
          <div id="chosen-preview">
            <div class="preview-slot">✦</div>
            <div class="preview-slot">✦</div>
            <div class="preview-slot">✦</div>
          </div>
          <button id="confirm-btn" class="btn-main" disabled>리딩 시작</button>
        </div>
      </div>

      <!-- 5. 결과 -->
      <div id="screen-result" class="screen">
        <div class="result-header">
          <img src="https://res.cloudinary.com/dla7g4hwb/image/upload/v1776220791/LOGO2_ofb84j.png" alt="logo">
          <p>카드가 전하는 이야기</p>
        </div>
        <div id="result-cards"></div>
        <div class="result-reading-box">
          <div class="result-reading-title">타 로 해 석</div>
          <div id="ai-reading"></div>
        </div>
        <div class="result-bottom">
          <button id="reset-btn" class="btn-main">다시 뽑기</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
// 프레임 자동 스케일 (작은 화면 대응)
function scaleFrame(){
  const wrapper = document.querySelector('.frame-wrapper');
  if(!wrapper) return;
  const scale = Math.min(window.innerWidth / 393, window.innerHeight / 852, 1);
  wrapper.style.transform = `scale(${scale})`;
}
window.addEventListener('load', scaleFrame);
window.addEventListener('resize', scaleFrame);
scaleFrame();

// 효과음
const SOUND_AA_URL = "https://res.cloudinary.com/dla7g4hwb/video/upload/v1776415549/AA_rqd7b9.mp3";
const SOUND_BB_URL = "https://res.cloudinary.com/dla7g4hwb/video/upload/v1776415549/BB_y1lav2.mp3";
const audioAA = [new Audio(SOUND_AA_URL), new Audio(SOUND_AA_URL)];
const audioBB = [new Audio(SOUND_BB_URL), new Audio(SOUND_BB_URL)];
audioAA.forEach(a => a.volume = 0.4);
audioBB.forEach(a => a.volume = 0.08);
let aaIdx = 0, bbIdx = 0;
function playCardSound(){
  if(selected.length >= 3) return;
  try { const a = audioAA[aaIdx]; a.currentTime = 0; a.play().catch(()=>{}); aaIdx = (aaIdx + 1) % audioAA.length; } catch(e) {}
}
function playBtnSound(){
  try { const a = audioBB[bbIdx]; a.currentTime = 0; a.play().catch(()=>{}); bbIdx = (bbIdx + 1) % audioBB.length; } catch(e) {}
}

// 미디어
const BACK_IMG_URL = "https://res.cloudinary.com/dla7g4hwb/image/upload/v1776350552/1776350465030_cb33w9.jpg";
const FOOL_URL  = "https://res.cloudinary.com/dla7g4hwb/video/upload/q_100/v1776217052/%EB%B0%94%EB%B3%B4_qevz75.mp4";
const MOON_URL  = "https://res.cloudinary.com/dla7g4hwb/video/upload/q_100/v1776219434/MOON_oqihp1.mp4";
const TOWER_URL = "https://res.cloudinary.com/dla7g4hwb/video/upload/q_100/v1776219434/tower_yhjkax.mp4";

const CARD_DATA = [
  ...Array.from({length:7}, (_,i) => ({id:i,     kr:"바보",  meaning:"새로운 시작, 순수함, 모험",  url:FOOL_URL})),
  ...Array.from({length:8}, (_,i) => ({id:100+i, kr:"달",    meaning:"환상, 불안, 무의식",          url:MOON_URL})),
  ...Array.from({length:7}, (_,i) => ({id:200+i, kr:"타워",  meaning:"붕괴, 각성, 급격한 변화",     url:TOWER_URL})),
];

function shuffle(arr){
  const a = [...arr];
  for(let n = a.length - 1; n > 0; n--){
    const m = Math.floor(Math.random() * (n + 1));
    [a[n], a[m]] = [a[m], a[n]];
  }
  return a;
}
function makeVideo(src){
  const v = document.createElement('video');
  v.src = src; v.muted = true; v.loop = true; v.autoplay = true; v.playsInline = true;
  v.disablePictureInPicture = true;
  v.style.cssText = 'width:100%;height:100%;object-fit:cover;';
  v.play().catch(()=>{});
  return v;
}
function makeBackImg(){
  const img = document.createElement('img');
  img.src = BACK_IMG_URL;
  img.alt = 'card back';
  img.draggable = false;
  return img;
}

// 덱 (393×500 기준 고정)
let deck = [], selected = [], fadeTimer = null;

function buildDeck(){
  const DECK_W = 393, DECK_H = 500;
  const cardW = 60, cardH = 88;
  const cols = 6;
  const total = CARD_DATA.length;
  const rows = Math.ceil(total / cols);
  const colGap = DECK_W / (cols + 0.5);
  const rowGap = Math.min(cardH + 10, (DECK_H * 0.92) / rows);

  return shuffle(CARD_DATA).map((card, idx) => {
    const row = Math.floor(idx / cols), col = idx % cols;
    const x = (col - (cols - 1) / 2) * colGap;
    const y = row * rowGap - ((rows - 1) * rowGap / 2);
    const rotate = (Math.random() * 14 - 7).toFixed(1);
    return { ...card, x, y, rotate, cardW, cardH };
  });
}

function initDeck(){
  deck = buildDeck();
  selected = [];
  const container = document.getElementById('deck-container');
  container.innerHTML = '';
  const cardW = 60, cardH = 88;
  const mw = cardW / 2, mh = cardH / 2;

  deck.forEach((card, idx) => {
    const el = document.createElement('div');
    el.className = 'card-slot';
    el.dataset.id = card.id;
    el.style.cssText =
      `--tx:${card.x}px;--ty:${card.y}px;--rot:${card.rotate}deg;--si:${(idx%5)*0.4}s;` +
      `width:${cardW}px;height:${cardH}px;` +
      `left:50%;top:50%;margin-left:-${mw}px;margin-top:-${mh}px;` +
      `transform:translate(${card.x}px,${card.y}px) rotate(${card.rotate}deg);` +
      `opacity:0;z-index:${idx};`;
    el.appendChild(makeBackImg());
    el.addEventListener('click', () => toggleSelect(card.id));
    container.appendChild(el);
  });

  let cnt = 0;
  clearInterval(fadeTimer);
  fadeTimer = setInterval(() => {
    if(cnt < deck.length){ container.children[cnt].style.opacity = '1'; cnt++; }
    else { clearInterval(fadeTimer); }
  }, 80);

  updatePickStatus(0);
}

function updatePickStatus(count){
  const el = document.getElementById('pick-status');
  if(count >= 3){
    el.textContent = '3 장 선 택 완 료';
    el.style.border = '1px solid #a78bfa';
    el.style.boxShadow = '0 0 10px 2px #a78bfa, 0 0 30px 8px #a78bfa55, 0 0 60px 15px #a78bfa33, inset 0 0 10px #a78bfa33';
  } else {
    el.textContent = `카드를 ${3 - count}장 더 고르세요`;
    el.style.border = '1px solid #a78bfa33';
    el.style.boxShadow = 'none';
  }
}

function toggleSelect(id){
  playCardSound();
  if(selected.includes(id)) selected = selected.filter(s => s !== id);
  else if(selected.length < 3) selected.push(id);
  updateUI();
}

function updateUI(){
  const container = document.getElementById('deck-container');
  const cardW = 60, cardH = 88;
  const mw = cardW / 2, mh = cardH / 2;

  Array.from(container.children).forEach(el => {
    const id = parseInt(el.dataset.id);
    const card = deck.find(c => c.id === id);
    const isSel = selected.includes(id);
    el.className = 'card-slot' + (isSel ? ' sel' : '');
    el.style.cssText =
      `--tx:${card.x}px;--ty:${card.y}px;--rot:${card.rotate}deg;` +
      `width:${cardW}px;height:${cardH}px;` +
      `left:50%;top:50%;margin-left:-${mw}px;margin-top:-${mh}px;` +
      `transform:translate(${card.x}px,${card.y}px) rotate(${card.rotate}deg);` +
      `opacity:1;z-index:${isSel ? 300 : deck.indexOf(card)};`;
  });

  updatePickStatus(selected.length);

  const slots = document.querySelectorAll('.preview-slot');
  slots.forEach((slot, idx) => {
    const cardId = selected[idx];
    slot.innerHTML = '';
    if(cardId != null){
      const card = deck.find(c => c.id === cardId);
      slot.classList.add('filled');
      slot.style.background = 'transparent';
      slot.appendChild(makeVideo(card.url));
    } else {
      slot.classList.remove('filled');
      slot.style.border = '1px dashed #a78bfa33';
      slot.style.background = '#0a001a';
      slot.innerHTML = '<span style="font-size:16px;color:#a78bfa33;">✦</span>';
    }
  });

  document.getElementById('confirm-btn').disabled = selected.length < 3;
}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

async function handleConfirm(){
  showScreen('result');
  const chosenCards = selected.map(id => deck.find(c => c.id === id));
  const resultCards = document.getElementById('result-cards');
  resultCards.innerHTML = '';
  chosenCards.forEach((card, idx) => {
    const div = document.createElement('div');
    div.className = 'rv-card fade-in';
    div.style.animationDelay = `${idx * 0.2}s`;
    div.appendChild(makeVideo(card.url));
    resultCards.appendChild(div);
  });

  const readingEl = document.getElementById('ai-reading');
  readingEl.innerHTML = [100, 80, 90, 70, 85, 60, 75].map(w => `<div class="shimmer" style="width:${w}%"></div>`).join('');

  const prompt = `당신은 신비로운 타로 리더입니다. 다음 3장의 카드로 과거-현재-미래를 한국어로 따뜻하고 시적으로 해석해주세요.

과거: ${chosenCards[0]?.kr} - ${chosenCards[0]?.meaning}
현재: ${chosenCards[1]?.kr} - ${chosenCards[1]?.meaning}
미래: ${chosenCards[2]?.kr} - ${chosenCards[2]?.meaning}

각 카드마다 📍과거/현재/미래 제목 붙이고 2~3문장. 마지막에 ✨전체 흐름 한 문단. 반말로 친근하게.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.map(b => b.text || '').join('') || '해석을 불러오지 못했어요.';
    readingEl.style.cssText = "font-family:'Noto Serif KR',serif;font-size:14px;line-height:1.9;color:#ffffff;";
    const html = text
      .replace(/\*\*(.+?)\*\*/g, '<strong style="color:#e9d5ff">$1</strong>')
      .replace(/^---$/gm, '<hr style="border:none;border-top:1px solid #7c3aed55;margin:12px 0;">')
      .replace(/\n/g, '<br>');
    readingEl.innerHTML = html;
  } catch(err){
    readingEl.style.color = '#ffffff';
    readingEl.textContent = '에러: ' + err.message;
  }
}

// 이벤트
document.getElementById('door-btn').addEventListener('click', () => {
  playBtnSound();
  showScreen('intro');
  const v = document.getElementById('intro-video');
  v.muted = false;
  const p = v.play();
  if(p && p.catch){
    p.catch(() => {
      v.muted = true;
      v.play().catch(()=>{});
      const soundBtn = document.getElementById('sound-btn');
      if(soundBtn) soundBtn.textContent = '🔇';
    });
  }
});

// 문 버튼 위치 (393×852 기준)
const DOOR_POS = { cx: 0.49, cy: 0.79, w: 0.22, h: 0.19 };
const VIDEO_RATIO = 9 / 16;
function positionDoorBtn(){
  const btn = document.getElementById('door-btn');
  if(!btn) return;
  const sw = 393, sh = 852;
  const screenRatio = sw / sh;
  let vw, vh, vx, vy;
  if(screenRatio > VIDEO_RATIO){
    vw = sw; vh = sw / VIDEO_RATIO; vx = 0; vy = (sh - vh) / 2;
  } else {
    vh = sh; vw = sh * VIDEO_RATIO; vy = 0; vx = (sw - vw) / 2;
  }
  const btnW = vw * DOOR_POS.w;
  const btnH = vh * DOOR_POS.h;
  btn.style.left   = (vx + vw * DOOR_POS.cx - btnW / 2) + 'px';
  btn.style.top    = (vy + vh * DOOR_POS.cy - btnH / 2) + 'px';
  btn.style.width  = btnW + 'px';
  btn.style.height = btnH + 'px';
}
window.addEventListener('load', positionDoorBtn);
document.getElementById('start-video').addEventListener('loadedmetadata', positionDoorBtn);
positionDoorBtn();

document.getElementById('intro-video').addEventListener('ended', () => showScreen('notice'));
document.getElementById('skip-btn').addEventListener('click', () => {
  document.getElementById('intro-video').pause();
  showScreen('notice');
});
document.getElementById('draw-btn').addEventListener('click', () => {
  playBtnSound();
  showScreen('pick');
  initDeck();
});
document.getElementById('confirm-btn').addEventListener('click', () => {
  playBtnSound();
  handleConfirm();
});
document.getElementById('reset-btn').addEventListener('click', () => {
  playBtnSound();
  selected = [];
  document.querySelectorAll('.preview-slot').forEach(el => {
    el.innerHTML = '✦';
    el.classList.remove('filled');
  });
  showScreen('pick');
  initDeck();
});
</script>
