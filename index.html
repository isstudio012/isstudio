<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VizMaker - fixed connect</title>
<style>
:root{
  --bg:#0f1115;--panel:#171a20;--panel2:#1d2129;--line:#2b313d;--text:#f3f4f6;--muted:#9aa2af;
  --blue:#27a7ff;--purple:#8b5cf6;--green:#22c55e;--red:#ef4444;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;height:100vh;overflow:hidden}
.app{display:grid;grid-template-columns:60px 1fr 320px;height:100vh}
.sidebar{background:#111318;border-right:1px solid #222834;padding:12px 8px;display:flex;flex-direction:column;gap:8px}
.sidebtn{width:44px;height:44px;border-radius:12px;border:1px solid #262c38;background:#171b22;color:#cbd5e1;display:grid;place-items:center;font-size:12px}
.canvas-wrap{position:relative;overflow:hidden}
.canvas-wrap::before{content:"";position:absolute;inset:0;background-image:radial-gradient(circle,#242a35 1px,transparent 1px);background-size:32px 32px;pointer-events:none}
#canvas{position:absolute;inset:0;overflow:hidden}
#connSvg{position:absolute;inset:0;pointer-events:auto;z-index:2}
.toolbar{position:absolute;top:16px;left:16px;z-index:10;display:flex;gap:8px}
.toolbtn{height:36px;padding:0 12px;border-radius:10px;border:1px solid #29303b;background:#181d24;color:#dbe2ea;cursor:pointer}
.status{position:absolute;top:16px;left:240px;z-index:10;min-height:36px;padding:8px 12px;border-radius:10px;background:rgba(16,24,40,.9);border:1px solid #2b3340;color:#dbe2ea;font-size:13px;display:flex;align-items:center;gap:8px}
.status b{color:#fff}
.bottom{position:absolute;left:16px;right:16px;bottom:16px;display:flex;gap:10px;z-index:10}
.btn{height:54px;padding:0 16px;border-radius:12px;border:1px solid #2a3240;background:#1b2028;color:#e5e7eb;cursor:pointer;font-weight:600}
.btn.primary{background:linear-gradient(180deg,#1c8cf0,#1673d0);border-color:#1574d6}
.prompt{flex:1;height:54px;border-radius:12px;border:1px solid #2a3240;background:#171b22;color:#fff;padding:14px 16px;outline:none}
.right{background:#171a20;border-left:1px solid #222834;padding:14px;display:flex;flex-direction:column;gap:14px}
.card{background:#1c2027;border:1px solid #2a313d;border-radius:14px;overflow:hidden}
.card h3{margin:0;padding:12px 14px;border-bottom:1px solid #2a313d;font-size:13px}
.preview{height:220px;display:grid;place-items:center;background:#14181f;color:#8f98a8}
.preview img{width:100%;height:100%;object-fit:cover;display:block}
.select,.input{width:100%;height:40px;border-radius:10px;border:1px solid #2a313d;background:#151921;color:#fff;padding:0 12px;outline:none}
.label{font-size:12px;color:#9aa2af;margin:0 0 6px}
.node{position:absolute;width:250px;background:#171b22;border:1px solid #313847;border-radius:22px;box-shadow:0 10px 30px rgba(0,0,0,.28);z-index:5;user-select:none}
.node.selected{border-color:#39a8ff;box-shadow:0 0 0 2px rgba(39,167,255,.2),0 12px 30px rgba(0,0,0,.35)}
.node.disabled{opacity:.45;filter:grayscale(1)}
.node.collapsed .thumb{display:none}
.node.collapsed .meta{padding-top:10px}
.head{position:absolute;right:10px;top:-18px;display:flex;gap:8px;z-index:8}
.head .iconbtn{width:40px;height:40px;border-radius:999px;border:1px solid #2f3542;background:#1a1e25;color:#fff;cursor:pointer;font-size:16px}
.head .iconbtn.on{border-color:#2bd36b;color:#62f59c}
.thumb{height:170px;border-radius:20px 20px 0 0;background:#222833;overflow:hidden;display:grid;place-items:center;color:#768194;position:relative}
.thumb img{width:100%;height:100%;object-fit:cover;display:none}
.thumb img.show{display:block}
.meta{padding:14px 16px 16px}
.title{font-weight:800;font-size:15px;margin-bottom:4px}
.sub{font-size:12px;color:#96a0ad}
.port{position:absolute;width:34px;height:34px;border-radius:999px;border:2px solid #36404f;background:#1f242c;display:grid;place-items:center;cursor:pointer;z-index:9;transition:.15s transform,.15s border-color,.15s box-shadow}
.port:hover{transform:scale(1.08)}
.port.active{box-shadow:0 0 0 6px rgba(39,167,255,.15)}
.port.out{right:-17px;top:50%;transform:translateY(-50%)}
.port.in{left:-17px;top:38%}
.port.in2{left:-17px;top:62%;border-color:#6f56d9}
.port .chev{font-size:18px;line-height:1;color:#cfd6df;pointer-events:none}
.port.in2 .chev{color:#b698ff}
.badge{display:inline-block;padding:3px 8px;border-radius:999px;background:#0f2840;color:#57b8ff;font-size:11px;font-weight:700;margin-left:8px}
.helper{padding:10px 12px;border-radius:12px;background:#111827;border:1px solid #273142;color:#c8d0da;font-size:12px;line-height:1.5}
.helper code{color:#8cd1ff}
.empty{padding:10px 12px;font-size:12px;color:#98a2b3}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebtn">노드</div>
    <div class="sidebtn">프로젝트</div>
    <div class="sidebtn">히스토리</div>
  </div>

  <div class="canvas-wrap">
    <div class="toolbar">
      <button class="toolbtn" id="fitBtn">Fit</button>
      <button class="toolbtn" id="clearLinkBtn">Clear Links</button>
      <button class="toolbtn" id="addRefBtn">+ Reference</button>
    </div>
    <div class="status" id="statusBox"><b>연결 방법:</b> 1번 <b>Source 오른쪽 포트</b>를 누른 뒤 2번 <b>Render 왼쪽 포트</b>를 눌러.</div>
    <svg id="connSvg"></svg>
    <div id="canvas"></div>
    <div class="bottom">
      <input class="prompt" id="promptInput" placeholder="작업 지시 입력... 예: clear sunny 1 PM daylight, no yellow tint" />
      <button class="btn" id="uploadSourceBtn">+ Source 이미지</button>
      <button class="btn primary" id="makeBtn">Make</button>
    </div>
    <input type="file" id="sourceInput" accept="image/*" hidden />
    <input type="file" id="refInput" accept="image/*" hidden />
  </div>

  <div class="right">
    <div class="card">
      <h3>Preview</h3>
      <div class="preview" id="previewBox">결과 미리보기</div>
    </div>
    <div class="card" style="padding:14px;display:grid;gap:12px">
      <div>
        <div class="label">Engine</div>
        <select class="select" id="engineSelect">
          <option value="flux">Flux Kontext Pro</option>
          <option value="nano">Nano Banana 2</option>
        </select>
      </div>
      <div>
        <div class="label">Replicate API key</div>
        <input class="input" id="apiKeyInput" type="password" placeholder="r8_xxx" />
      </div>
      <div>
        <div class="label">Time of day</div>
        <select class="select" id="todSelect">
          <option value="daytime, bright exterior daylight visible through windows">Day</option>
          <option value="night time, dark exterior outside windows, interior lights on">Night</option>
          <option value="sunset golden hour, warm orange light through windows">Sunset</option>
        </select>
      </div>
      <div class="helper">
        이번 버전은 <code>클릭 연결</code> + <code>드래그 연결</code> 둘 다 됨.<br>
        Source → Render 일반 입력 / Reference → Render 보라 입력.
      </div>
      <div class="empty" id="debugText">연결 없음</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const svg = document.getElementById('connSvg');
const statusBox = document.getElementById('statusBox');
const debugText = document.getElementById('debugText');
const previewBox = document.getElementById('previewBox');

let zoom = 1, panX = 120, panY = 100;
let dragNode = null, dragOffsetX = 0, dragOffsetY = 0;
let panning = false, panStartX = 0, panStartY = 0;
let linkStart = null; // {nodeId, type, x, y}
let tempMouse = null;
let nodes = [];
let connections = [];
let resultUrl = null;

function uid(prefix='n'){ return prefix + Math.random().toString(36).slice(2, 9); }
function getNode(id){ return nodes.find(n => n.id === id); }
function px(v){ return `${v}px`; }
function setStatus(msg){ statusBox.innerHTML = msg; }

function worldToScreen(x,y){ return { x:x*zoom + panX, y:y*zoom + panY }; }
function screenToWorld(x,y){ return { x:(x-panX)/zoom, y:(y-panY)/zoom }; }

function createNode(type, x, y){
  const node = {
    id: uid(type[0]), type, x, y, image:null, enabled:true, collapsed:false
  };
  nodes.push(node);
  renderNode(node);
  return node;
}

function renderNode(node){
  const el = document.createElement('div');
  el.className = 'node';
  el.id = node.id;
  el.innerHTML = `
    <div class="head">
      <button class="iconbtn on" data-action="toggle" title="켜기/끄기">⏻</button>
      <button class="iconbtn" data-action="collapse" title="접기/펼치기">▾</button>
      ${node.type === 'render' ? '' : '<button class="iconbtn" data-action="delete" title="삭제">×</button>'}
    </div>
    <div class="thumb" data-action="upload">
      <img alt="" />
      <div class="placeholder">${node.type === 'source' ? 'Source 이미지 업로드' : node.type === 'ref' ? 'Reference 업로드' : '렌더 결과'}</div>
    </div>
    <div class="meta">
      <div class="title">${node.type === 'source' ? 'Source' : node.type === 'ref' ? 'Reference' : 'Render'} ${node.type === 'render' ? '<span class="badge">'+document.getElementById('engineSelect').selectedOptions[0].text+'</span>' : ''}</div>
      <div class="sub">${node.type === 'source' ? '입력 이미지' : node.type === 'ref' ? '스타일/재질 기준' : '결과 노드'}</div>
    </div>
    ${node.type !== 'render' ? '<div class="port out" data-port="out" title="출력"><span class="chev">›</span></div>' : ''}
    ${node.type === 'render' ? '<div class="port in" data-port="in" title="일반 입력"><span class="chev">›</span></div><div class="port in2" data-port="in2" title="Reference 입력"><span class="chev">›</span></div>' : ''}
  `;
  canvas.appendChild(el);
  bindNode(el, node);
  updateNode(node.id);
}

function updateNode(nodeId){
  const node = getNode(nodeId);
  const el = document.getElementById(nodeId);
  if(!node || !el) return;
  el.style.left = px(node.x);
  el.style.top = px(node.y);
  el.style.transform = `translate(${panX}px, ${panY}px) scale(${zoom})`;
  el.style.transformOrigin = '0 0';
  el.classList.toggle('disabled', !node.enabled);
  el.classList.toggle('collapsed', node.collapsed);
  const img = el.querySelector('img');
  const ph = el.querySelector('.placeholder');
  if(node.image){ img.src = node.image; img.classList.add('show'); ph.style.display='none'; }
  else { img.classList.remove('show'); ph.style.display=''; }
  if(node.type === 'render'){
    const badge = el.querySelector('.badge');
    if (badge) badge.textContent = document.getElementById('engineSelect').selectedOptions[0].text;
  }
}

function bindNode(el,node){
  el.addEventListener('mousedown', (e)=>{
    if (e.target.closest('.port') || e.target.closest('[data-action]')) return;
    e.preventDefault();
    const p = screenToWorld(e.clientX, e.clientY);
    dragNode = node.id;
    dragOffsetX = p.x - node.x;
    dragOffsetY = p.y - node.y;
    selectNode(node.id);
  });

  el.addEventListener('click', (e)=>{
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    e.stopPropagation();
    const action = btn.dataset.action;
    if (action === 'toggle') {
      node.enabled = !node.enabled;
      btn.classList.toggle('on', node.enabled);
      updateNode(node.id);
      redraw();
    }
    if (action === 'collapse') {
      node.collapsed = !node.collapsed;
      btn.textContent = node.collapsed ? '▸' : '▾';
      updateNode(node.id);
      redraw();
    }
    if (action === 'delete' && node.type !== 'render') {
      connections = connections.filter(c => c.from !== node.id && c.to !== node.id);
      nodes = nodes.filter(n => n.id !== node.id);
      el.remove();
      redraw();
      syncDebug();
    }
    if (action === 'upload') {
      if(node.type === 'source') document.getElementById('sourceInput').click();
      if(node.type === 'ref') document.getElementById('refInput').click();
    }
  });

  const out = el.querySelector('.port.out');
  if (out) {
    out.addEventListener('mousedown', (e)=>{
      e.preventDefault(); e.stopPropagation();
      beginLink(node.id);
    });
    out.addEventListener('click', (e)=>{
      e.preventDefault(); e.stopPropagation();
      beginLink(node.id);
    });
  }

  const inPort = el.querySelector('.port.in');
  if (inPort) {
    inPort.addEventListener('mousedown', (e)=>{ e.preventDefault(); e.stopPropagation(); finishLink(node.id,'in'); });
    inPort.addEventListener('click', (e)=>{ e.preventDefault(); e.stopPropagation(); finishLink(node.id,'in'); });
  }
  const in2Port = el.querySelector('.port.in2');
  if (in2Port) {
    in2Port.addEventListener('mousedown', (e)=>{ e.preventDefault(); e.stopPropagation(); finishLink(node.id,'in2'); });
    in2Port.addEventListener('click', (e)=>{ e.preventDefault(); e.stopPropagation(); finishLink(node.id,'in2'); });
  }
}

function selectNode(id){
  document.querySelectorAll('.node').forEach(n => n.classList.remove('selected'));
  if(id) document.getElementById(id)?.classList.add('selected');
}

function getPortWorldPos(nodeId, port){
  const node = getNode(nodeId);
  if(!node) return null;
  const width = 250;
  const height = node.collapsed ? 72 : 244;
  if (port === 'out') return { x: node.x + width, y: node.y + height*0.5 };
  if (port === 'in') return { x: node.x, y: node.y + height*0.38 };
  if (port === 'in2') return { x: node.x, y: node.y + height*0.62 };
  return null;
}

function beginLink(fromId){
  const from = getNode(fromId);
  if(!from || from.type === 'render' || !from.enabled) return;
  linkStart = { nodeId: fromId, type: from.type };
  tempMouse = null;
  document.querySelectorAll('.port').forEach(p=>p.classList.remove('active'));
  document.getElementById(fromId)?.querySelector('.port.out')?.classList.add('active');
  if (from.type === 'source') setStatus('<b>연결 중:</b> 이제 2번 <b>Render 왼쪽 위 입력 포트</b>를 클릭해.');
  if (from.type === 'ref') setStatus('<b>연결 중:</b> 이제 <b>Render 보라 입력 포트</b>를 클릭해.');
  redraw();
}

function finishLink(toId, port){
  if(!linkStart) return;
  const expected = linkStart.type === 'ref' ? 'in2' : 'in';
  if (port !== expected) {
    setStatus('<b>에러:</b> Source는 일반 입력(in), Reference는 보라 입력(in2)으로 연결해야 함.');
    cancelLink();
    return;
  }
  const exists = connections.some(c => c.from === linkStart.nodeId && c.to === toId && c.port === port);
  if (!exists) connections.push({ id: uid('c'), from: linkStart.nodeId, to: toId, port });
  cancelLink(false);
  redraw();
  syncDebug();
  setStatus('<b>연결 완료:</b> 이제 아래 프롬프트 입력하고 Make 누르면 됨.');
}

function cancelLink(resetMsg=true){
  linkStart = null; tempMouse = null;
  document.querySelectorAll('.port').forEach(p=>p.classList.remove('active'));
  if (resetMsg) setStatus('<b>연결 방법:</b> 1번 <b>Source 오른쪽 포트</b>를 누른 뒤 2번 <b>Render 왼쪽 포트</b>를 눌러.');
  redraw();
}

function syncDebug(){
  if(!connections.length){ debugText.textContent = '연결 없음'; return; }
  debugText.textContent = connections.map(c => `${getNode(c.from)?.type} → ${c.port}`).join(' / ');
}

function drawPath(x1,y1,x2,y2,color,dashed=false,id=''){
  const mid = (x1+x2)/2;
  const p = document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d', `M ${x1} ${y1} C ${mid} ${y1}, ${mid} ${y2}, ${x2} ${y2}`);
  p.setAttribute('stroke', color);
  p.setAttribute('stroke-width', '4');
  p.setAttribute('fill', 'none');
  p.setAttribute('stroke-linecap', 'round');
  if (dashed) p.setAttribute('stroke-dasharray', '10 8');
  if (id) p.dataset.connId = id;
  return p;
}

function redraw(){
  svg.innerHTML = '';
  svg.setAttribute('width', window.innerWidth);
  svg.setAttribute('height', window.innerHeight);

  connections.forEach(c => {
    const s = getPortWorldPos(c.from, 'out');
    const t = getPortWorldPos(c.to, c.port);
    if(!s || !t) return;
    const ss = worldToScreen(s.x, s.y);
    const tt = worldToScreen(t.x, t.y);
    const color = c.port === 'in2' ? '#8b5cf6' : '#27a7ff';
    const path = drawPath(ss.x, ss.y, tt.x, tt.y, color, false, c.id);
    path.style.cursor = 'pointer';
    path.addEventListener('dblclick', (e)=>{
      e.stopPropagation();
      connections = connections.filter(x => x.id !== c.id);
      redraw(); syncDebug();
      setStatus('<b>연결 삭제:</b> 다시 연결하면 됨.');
    });
    svg.appendChild(path);
    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx', tt.x); dot.setAttribute('cy', tt.y); dot.setAttribute('r', '6'); dot.setAttribute('fill', color);
    svg.appendChild(dot);
  });

  if(linkStart){
    const s = getPortWorldPos(linkStart.nodeId, 'out');
    if (s) {
      const ss = worldToScreen(s.x,s.y);
      const tm = tempMouse || ss;
      const color = linkStart.type === 'ref' ? '#8b5cf6' : '#27a7ff';
      svg.appendChild(drawPath(ss.x, ss.y, tm.x, tm.y, color, true));
    }
  }

  nodes.forEach(n=>updateNode(n.id));
}

function setNodeImage(nodeType, dataUrl){
  const node = nodes.find(n => n.type === nodeType);
  if (!node) return;
  node.image = dataUrl;
  updateNode(node.id);
  if (nodeType === 'source') previewBox.innerHTML = `<img src="${dataUrl}" alt="">`;
}

function fileToDataUrl(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function getConnectedInput(){
  const render = nodes.find(n => n.type === 'render');
  const srcConn = connections.find(c => c.to === render.id && c.port === 'in' && getNode(c.from)?.enabled);
  const refConn = connections.find(c => c.to === render.id && c.port === 'in2' && getNode(c.from)?.enabled);
  return {
    render,
    source: srcConn ? getNode(srcConn.from) : null,
    reference: refConn ? getNode(refConn.from) : null,
  };
}

function sanitizePrompt(raw){
  return String(raw || '').normalize('NFKC').replace(/[\u2500-\u257F]/g,'-').replace(/[\u0000-\u001F\u007F]/g,' ').replace(/\s+/g,' ').trim();
}

async function doRender(){
  const apiKey = document.getElementById('apiKeyInput').value.trim();
  const { source, reference } = getConnectedInput();
  if (!source?.image) {
    setStatus('<b>먼저 연결:</b> Source 오른쪽 포트 → Render 왼쪽 포트 연결부터 해.');
    return;
  }
  if (!apiKey.startsWith('r8_')) {
    setStatus('<b>API key 필요:</b> 오른쪽 패널에 Replicate 키 입력해.');
    return;
  }
  const prompt = sanitizePrompt([document.getElementById('todSelect').value, document.getElementById('promptInput').value].filter(Boolean).join(', '));
  const body = { apiKey, prompt, image: source.image, refImage: reference?.image || null, asciiSafe:false };
  setStatus('<b>렌더 요청 준비:</b> 연결은 정상. 이제 /api/render 백엔드만 UTF-8 JSON 처리면 됨.');
  console.log('render payload ready', body);
  alert('연결은 정상 작동 중.\n이제 실제 렌더는 /api/render 백엔드가 있어야 돌아가.\n현재 파일은 연결/노드 UI 수정본이야.');
}

window.addEventListener('mousemove', (e)=>{
  if (dragNode) {
    const node = getNode(dragNode);
    const p = screenToWorld(e.clientX, e.clientY);
    node.x = p.x - dragOffsetX;
    node.y = p.y - dragOffsetY;
    redraw();
  }
  if (panning) {
    panX += e.clientX - panStartX;
    panY += e.clientY - panStartY;
    panStartX = e.clientX;
    panStartY = e.clientY;
    redraw();
  }
  if (linkStart) {
    tempMouse = { x:e.clientX, y:e.clientY };
    redraw();
  }
});
window.addEventListener('mouseup', ()=>{ dragNode = null; panning = false; });
canvas.addEventListener('mousedown', (e)=>{
  if (e.target !== canvas) return;
  if (linkStart) { cancelLink(); return; }
  panning = true; panStartX = e.clientX; panStartY = e.clientY;
});
canvas.addEventListener('click', (e)=>{ if (e.target === canvas) selectNode(null); });
canvas.addEventListener('wheel', (e)=>{ e.preventDefault(); const factor = e.deltaY > 0 ? 0.92 : 1.08; zoom = Math.max(0.5, Math.min(1.8, zoom * factor)); redraw(); }, {passive:false});
window.addEventListener('resize', redraw);

document.getElementById('fitBtn').addEventListener('click', ()=>{ zoom = 1; panX = 120; panY = 100; redraw(); });
document.getElementById('clearLinkBtn').addEventListener('click', ()=>{ connections = []; cancelLink(); syncDebug(); setStatus('<b>연결 초기화:</b> 다시 Source → Render로 연결해.'); });
document.getElementById('addRefBtn').addEventListener('click', ()=>{
  if (nodes.some(n => n.type === 'ref')) return;
  createNode('ref', 220, 330); redraw();
});
document.getElementById('uploadSourceBtn').addEventListener('click', ()=> document.getElementById('sourceInput').click());
document.getElementById('makeBtn').addEventListener('click', doRender);
document.getElementById('engineSelect').addEventListener('change', ()=> redraw());
document.getElementById('sourceInput').addEventListener('change', async (e)=>{ const f=e.target.files[0]; if(!f) return; setNodeImage('source', await fileToDataUrl(f)); e.target.value=''; });
document.getElementById('refInput').addEventListener('change', async (e)=>{ const f=e.target.files[0]; if(!f) return; setNodeImage('ref', await fileToDataUrl(f)); e.target.value=''; });

// init
createNode('source', 160, 200);
createNode('render', 560, 200);
redraw();
syncDebug();
</script>
</body>
