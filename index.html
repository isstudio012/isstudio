<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Node Render UI</title>
<style>
:root{--bg:#141414;--panel:#1c1c1c;--panel2:#232323;--line:#4a4a4a;--text:#f4f4f4;--muted:#b9b9b9}
*{box-sizing:border-box;margin:0;padding:0} html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:Inter,Arial,sans-serif;color:var(--text)}
button,input,select,textarea{font:inherit}
#app{width:100%;height:100%;position:relative;background:var(--bg)}
#canvas{position:absolute;inset:0;overflow:hidden;background:radial-gradient(circle at 1px 1px, rgba(255,255,255,.08) 1px, transparent 0) 0 0/28px 28px,var(--bg)}
#connections{position:absolute;inset:0;pointer-events:none}
.toolbar{position:absolute;top:16px;left:16px;display:flex;gap:8px;z-index:20}
.tb{height:36px;padding:0 14px;border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:10px;cursor:pointer}.tb:hover{background:var(--panel2)}
.node{position:absolute;min-width:260px;background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:0 12px 30px rgba(0,0,0,.25);user-select:none;transform-origin:top left}.node.small{min-width:220px}.node.result{width:260px}
.node-header{height:38px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid rgba(255,255,255,.06);cursor:grab}
.node-title{font-size:13px;color:var(--text)} .node-actions{display:flex;gap:6px}
.icon-btn{width:24px;height:24px;border:none;background:transparent;color:#fff;cursor:pointer;border-radius:6px;font-size:14px}.icon-btn:hover{background:rgba(255,255,255,.08)}
.node-body{padding:12px}.image-box{width:100%;height:180px;border-radius:14px;border:1px dashed rgba(255,255,255,.18);background:#171717;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;position:relative}
.image-box img{width:100%;height:100%;object-fit:cover;display:none}.image-box.has-image img{display:block}.image-box .ghost{font-size:13px;color:var(--muted);padding:0 12px;text-align:center}
.engine-select{width:100%;height:42px;border-radius:12px;border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:0 12px;outline:none;margin-bottom:10px}
.prompt{width:100%;min-height:96px;border-radius:12px;border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:12px;outline:none;resize:vertical}.prompt::placeholder{color:#d8d8d8}
.make{width:100%;height:42px;border:none;border-radius:12px;background:#efefef;color:#111;margin-top:10px;cursor:pointer;font-weight:600}.make:hover{background:#fff}.make:disabled{opacity:.45;cursor:not-allowed}
.port{position:absolute;width:16px;height:16px;border-radius:999px;background:#fff;border:2px solid #1b1b1b;z-index:3;cursor:pointer}.port.in{left:-8px;top:50%;transform:translateY(-50%)}.port.out{right:-8px;top:50%;transform:translateY(-50%)}
.line-hit{pointer-events:stroke;cursor:pointer}.fullscreen{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:50;cursor:zoom-out}.fullscreen.on{display:flex}.fullscreen img{max-width:92vw;max-height:90vh;object-fit:contain;border-radius:16px}
#fileInput{display:none}.notice{position:absolute;bottom:16px;left:16px;padding:8px 12px;border-radius:10px;background:rgba(28,28,28,.95);border:1px solid var(--line);color:var(--muted);font-size:12px;z-index:20}
.loading{font-size:12px;color:var(--muted);margin-top:8px;text-align:center}
</style>
</head>
<body>
<div id="app">
  <div class="toolbar">
    <button class="tb" id="addSource">+ Source</button>
    <button class="tb" id="addNode">+ Node</button>
  </div>
  <div id="canvas"><svg id="connections"></svg></div>
  <div class="notice">Result / Final 노드는 처음엔 없음 · 렌더 후에만 생성</div>
</div>
<input id="fileInput" type="file" accept="image/*" />
<div id="fullscreen" class="fullscreen"><img id="fullscreenImg" alt="" /></div>
<script>
const canvas = document.getElementById('canvas');
const svg = document.getElementById('connections');
const fileInput = document.getElementById('fileInput');
const fullscreen = document.getElementById('fullscreen');
const fullscreenImg = document.getElementById('fullscreenImg');
let nodes = [], links = [], zCounter = 5, drag = null, pendingUploadNode = null, connectStart = null, tempMouse = null, selectedLink = null;
const API_RENDER = '/api/render';
function uid(prefix='n'){ return prefix + Math.random().toString(36).slice(2,9); }
function renderNode(node){
  const el = document.createElement('div');
  el.className = 'node' + (node.type === 'engine' ? ' small' : '') + (node.type === 'result' ? ' result' : '');
  el.id = node.id; el.style.left = node.x + 'px'; el.style.top = node.y + 'px';
  if(node.type === 'source') el.innerHTML = `<div class="node-header"><div class="node-title">Source</div><div class="node-actions"><button class="icon-btn delete-node">×</button></div></div><div class="node-body"><div class="image-box source-box ${node.image?'has-image':''}"><img src="${node.image||''}"><div class="ghost">Image</div></div></div><div class="port out" data-port="out"></div>`;
  if(node.type === 'engine') el.innerHTML = `<div class="node-header"><div class="node-title">Node</div><div class="node-actions"><button class="icon-btn delete-node">×</button></div></div><div class="node-body"><select class="engine-select"><option>Flux Kontext Pro</option><option>Nano Banana 2</option><option>Image Engine</option></select><textarea class="prompt" placeholder="Prompt"></textarea><button class="make">Make</button><div class="loading" style="display:none">Rendering...</div></div><div class="port in" data-port="in"></div><div class="port out" data-port="out"></div>`;
  if(node.type === 'result') el.innerHTML = `<div class="node-header"><div class="node-title">Result</div><div class="node-actions"><button class="icon-btn delete-node">×</button></div></div><div class="node-body"><div class="image-box result-box ${node.image?'has-image':''}"><img src="${node.image||''}"><div class="ghost">Image</div></div></div><div class="port in" data-port="in"></div><div class="port out" data-port="out"></div>`;
  if(node.type === 'final') el.innerHTML = `<div class="node-header"><div class="node-title">Final</div><div class="node-actions"><button class="icon-btn delete-node">×</button></div></div><div class="node-body"><div class="image-box result-box ${node.image?'has-image':''}"><img src="${node.image||''}"><div class="ghost">Image</div></div></div><div class="port in" data-port="in"></div>`;
  canvas.appendChild(el); bindNodeEvents(node, el); bringToFront(el); redraw();
}
function addSourceNode(x=90,y=120){ const n={id:uid('src_'),type:'source',x,y,image:null}; nodes.push(n); renderNode(n); }
function addEngineNode(x=420,y=120){ const n={id:uid('eng_'),type:'engine',x,y,engine:'Flux Kontext Pro',prompt:''}; nodes.push(n); renderNode(n); }
function addImageNode(type, x, y, image){ const n={id:uid(type==='final'?'fin_':'res_'),type,x,y,image}; nodes.push(n); renderNode(n); return n; }
function bindNodeEvents(node, el){
  el.querySelector('.node-header').addEventListener('mousedown', e=>{ if(e.target.closest('.icon-btn')) return; drag={id:node.id, dx:e.clientX-node.x, dy:e.clientY-node.y}; bringToFront(el); });
  el.querySelector('.delete-node')?.addEventListener('click', e=>{ e.stopPropagation(); removeNode(node.id); });
  if(node.type==='source') el.querySelector('.source-box').addEventListener('click', e=>{ e.stopPropagation(); pendingUploadNode=node.id; fileInput.click(); });
  if(node.type==='engine'){
    const sel=el.querySelector('.engine-select'), ta=el.querySelector('.prompt'); sel.value=node.engine; ta.value=node.prompt;
    sel.addEventListener('change', ()=>node.engine=sel.value); ta.addEventListener('input', ()=>node.prompt=ta.value);
    el.querySelector('.make').addEventListener('click', ()=>runEngine(node.id));
  }
  if(node.type==='result' || node.type==='final') el.querySelector('.result-box').addEventListener('click', e=>{ e.stopPropagation(); if(node.image) toggleFullscreen(node.image); });
  el.querySelectorAll('.port').forEach(port=>{
    port.addEventListener('mousedown', e=>{ e.stopPropagation(); selectedLink=null; redraw(); connectStart={nodeId:node.id, port:port.dataset.port}; });
    port.addEventListener('mouseup', e=>{ e.stopPropagation(); if(!connectStart) return; if(connectStart.nodeId===node.id){ connectStart=null; tempMouse=null; redraw(); return; }
      if(connectStart.port==='out' && port.dataset.port==='in') { if(!links.some(l=>l.from===connectStart.nodeId && l.to===node.id)) links.push({id:uid('ln_'), from:connectStart.nodeId, to:node.id}); }
      connectStart=null; tempMouse=null; redraw();
    });
  });
}
function bringToFront(el){ zCounter += 1; el.style.zIndex = zCounter; }
function removeNode(id){ links = links.filter(l=>l.from!==id && l.to!==id); nodes = nodes.filter(n=>n.id!==id); document.getElementById(id)?.remove(); redraw(); }
function removeLink(id){ links = links.filter(l=>l.id!==id); if(selectedLink===id) selectedLink=null; redraw(); }
function getNodeRect(node){ const el=document.getElementById(node.id); return {w:el.offsetWidth,h:el.offsetHeight}; }
function getPortPos(nodeId, kind){ const node=nodes.find(n=>n.id===nodeId); const rect=getNodeRect(node); return kind==='out'?{x:node.x+rect.w,y:node.y+rect.h/2}:{x:node.x,y:node.y+rect.h/2}; }
function redraw(){ svg.setAttribute('width', canvas.clientWidth); svg.setAttribute('height', canvas.clientHeight); svg.innerHTML=''; document.querySelectorAll('.ghost').forEach(g=>g.style.display = g.parentElement.classList.contains('has-image') ? 'none':'block');
  links.forEach(link=>{ const from=getPortPos(link.from,'out'), to=getPortPos(link.to,'in'), mx=(from.x+to.x)/2; const path=document.createElementNS('http://www.w3.org/2000/svg','path'); path.setAttribute('d',`M ${from.x} ${from.y} C ${mx} ${from.y}, ${mx} ${to.y}, ${to.x} ${to.y}`); path.setAttribute('fill','none'); path.setAttribute('stroke',selectedLink===link.id?'#ffffff':'#8a8a8a'); path.setAttribute('stroke-width',selectedLink===link.id?'3':'2'); path.setAttribute('class','line-hit'); path.style.pointerEvents='stroke'; path.addEventListener('click',e=>{ e.stopPropagation(); selectedLink=link.id; redraw(); }); path.addEventListener('dblclick',e=>{ e.stopPropagation(); removeLink(link.id); }); svg.appendChild(path); });
  if(connectStart && tempMouse){ const from=getPortPos(connectStart.nodeId, connectStart.port), mx=(from.x+tempMouse.x)/2; const path=document.createElementNS('http://www.w3.org/2000/svg','path'); path.setAttribute('d',`M ${from.x} ${from.y} C ${mx} ${from.y}, ${mx} ${tempMouse.y}, ${tempMouse.x} ${tempMouse.y}`); path.setAttribute('fill','none'); path.setAttribute('stroke','#ffffff'); path.setAttribute('stroke-width','2'); path.setAttribute('stroke-dasharray','5 5'); svg.appendChild(path); }
}
function connectedInputImage(engineId){ const incoming=links.filter(l=>l.to===engineId); for(const link of incoming){ const src=nodes.find(n=>n.id===link.from); if(src && src.image) return src.image; } return null; }
function latestDownstreamResult(engineId){ return nodes.find(n => (n.type==='result'||n.type==='final') && links.some(l=>l.from===engineId && l.to===n.id)); }
async function runEngine(engineId){
  const engineNode=nodes.find(n=>n.id===engineId), el=document.getElementById(engineId), btn=el.querySelector('.make'), loading=el.querySelector('.loading');
  const inputImage=connectedInputImage(engineId); if(!inputImage){ alert('이미지를 연결해줘.'); return; }
  btn.disabled=true; loading.style.display='block';
  try{
    let outputImage = inputImage;
    try{
      const res = await fetch(API_RENDER, {method:'POST', headers:{'Content-Type':'application/json; charset=utf-8'}, body:JSON.stringify({engine:engineNode.engine, prompt:String(engineNode.prompt||''), image:inputImage})});
      if(res.ok){ const data=await res.json(); outputImage = Array.isArray(data.output) ? data.output[0] : (data.output || data.image || inputImage); }
    }catch(_e){}
    const existing = latestDownstreamResult(engineId);
    if(existing){ existing.image = outputImage; const box=document.getElementById(existing.id).querySelector('.image-box'); const img=document.getElementById(existing.id).querySelector('img'); img.src=outputImage; box.classList.add('has-image'); }
    else {
      const result = addImageNode('result', engineNode.x + 340, engineNode.y + 8, outputImage);
      links.push({id:uid('ln_'), from:engineId, to:result.id});
    }
    redraw();
  } finally { btn.disabled=false; loading.style.display='none'; }
}
fileInput.addEventListener('change', e=>{ const file=e.target.files[0]; if(!file||!pendingUploadNode) return; const reader=new FileReader(); reader.onload=ev=>{ const node=nodes.find(n=>n.id===pendingUploadNode); if(!node) return; node.image=ev.target.result; const el=document.getElementById(node.id); el.querySelector('img').src=node.image; el.querySelector('.image-box').classList.add('has-image'); redraw(); }; reader.readAsDataURL(file); e.target.value=''; });
document.addEventListener('mousemove', e=>{ if(drag){ const node=nodes.find(n=>n.id===drag.id); node.x=Math.max(20,e.clientX-drag.dx); node.y=Math.max(20,e.clientY-drag.dy); const el=document.getElementById(node.id); el.style.left=node.x+'px'; el.style.top=node.y+'px'; redraw(); } if(connectStart){ const rect=canvas.getBoundingClientRect(); tempMouse={x:e.clientX-rect.left,y:e.clientY-rect.top}; redraw(); } });
document.addEventListener('mouseup', ()=>{ drag=null; if(connectStart && !tempMouse) connectStart=null; });
document.addEventListener('keydown', e=>{ if((e.key==='Delete'||e.key==='Backspace') && selectedLink) removeLink(selectedLink); });
canvas.addEventListener('click', ()=>{ selectedLink=null; redraw(); });
document.getElementById('addSource').addEventListener('click', ()=>addSourceNode(80 + Math.random()*180, 100 + Math.random()*220));
document.getElementById('addNode').addEventListener('click', ()=>addEngineNode(380 + Math.random()*220, 110 + Math.random()*220));
function toggleFullscreen(src){ if(fullscreen.classList.contains('on') && fullscreenImg.src===src){ fullscreen.classList.remove('on'); fullscreenImg.src=''; } else { fullscreenImg.src=src; fullscreen.classList.add('on'); } }
fullscreen.addEventListener('click', ()=>{ fullscreen.classList.remove('on'); fullscreenImg.src=''; });
addSourceNode(); addEngineNode();
</script>
</body>
</html>
