<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RenderAI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#f0f0ee;--white:#fff;--border:#e2e2de;--text:#1a1a1a;--muted:#999;--light:#ccc;--panel:260px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px}

/* HEADER */
header{height:44px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:10px;flex-shrink:0}
.logo{width:26px;height:26px;background:#1a1a1a;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo span{color:#fff;font-size:11px;font-weight:700}
.logo-name{font-size:13px;font-weight:600;color:var(--text)}
.hright{margin-left:auto;display:flex;gap:8px;align-items:center}
.avatar-wrap{display:flex;align-items:center;gap:8px}
.avatar{width:28px;height:28px;border-radius:50%;background:#e8e8e8;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted)}
.avatar-name{font-size:12px;color:var(--text);font-weight:500}
.avatar-email{font-size:10px;color:var(--muted)}

/* APP BODY */
.app{flex:1;display:flex;overflow:hidden}

/* LEFT PROJECT PANEL */
.lbar{width:180px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.lbar-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.lbar-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.lbtn{width:24px;height:24px;border-radius:5px;border:none;background:none;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
.lbtn:hover{background:var(--bg);color:var(--text)}
.project-list{flex:1;overflow-y:auto;padding:8px;scrollbar-width:none;display:flex;flex-direction:column;gap:4px}
.project-list::-webkit-scrollbar{display:none}
.project-item{border-radius:7px;overflow:hidden;cursor:pointer;border:2px solid transparent;transition:all .15s;background:var(--bg)}
.project-item:hover{border-color:#ccc}
.project-item.active{border-color:#1a1a1a}
.project-item img{width:100%;height:90px;object-fit:cover;display:block}
.project-item-label{padding:5px 8px;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.project-item.active .project-item-label{color:var(--text);font-weight:500}
.lbar-add{margin:8px;padding:10px;border:1.5px dashed var(--border);border-radius:7px;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;color:var(--muted);font-size:12px;transition:all .15s;flex-shrink:0}
.lbar-add:hover{border-color:#999;color:var(--text)}

/* CENTER */
.center{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* THUMBS BAR */
.thumbbar{background:var(--white);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.tnav{width:22px;height:22px;border-radius:4px;border:1px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted);flex-shrink:0}
.tnav:hover{background:var(--bg)}
.thumbs-wrap{display:flex;gap:8px;flex:1;overflow:hidden}
.thumb{width:80px;height:56px;border-radius:6px;border:2px solid transparent;overflow:hidden;cursor:pointer;flex-shrink:0;background:#ddd;position:relative;transition:all .15s}
.thumb:hover{border-color:#aaa}
.thumb.active{border-color:#1a1a1a}
.thumb img{width:100%;height:100%;object-fit:cover}
.thumb-num{position:absolute;bottom:3px;left:5px;font-size:9px;color:#fff;font-weight:600;text-shadow:0 1px 3px rgba(0,0,0,.6);background:rgba(0,0,0,.3);padding:1px 4px;border-radius:3px}
.thumb-badge{position:absolute;top:3px;right:4px;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px}
.thumb-badge.orig{background:rgba(0,0,0,.5);color:#fff}
.thumb-badge.rendered{background:#1a1a1a;color:#fff}display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--light);font-size:20px;flex-shrink:0;transition:all .15s}
.thumb-add:hover{border-color:#999;color:var(--muted)}

/* CANVAS AREA */
.canvas-wrap{flex:1;padding:12px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:0}

/* UPLOAD STATE */
.upload-zone{position:absolute;inset:12px;background:#e8e8e6;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;border:2px dashed transparent}
.upload-zone:hover{border-color:#ccc;background:#e2e2e0}
.upload-icon{width:52px;height:52px;background:#d8d8d6;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:14px}
.upload-zone h3{font-size:14px;font-weight:600;margin-bottom:6px}
.upload-zone p{font-size:12px;color:var(--muted);text-align:center;line-height:1.5}
.upload-zone small{font-size:10px;color:var(--light);margin-top:8px;text-transform:uppercase;letter-spacing:.5px}

/* CANVAS WITH IMAGE */
.canvas{position:absolute;inset:12px;border-radius:10px;overflow:hidden;background:#1a1a1a;display:none}
.canvas.visible{display:block}

/* RENDER VIEW */
.render-view{width:100%;height:100%;position:relative;display:flex;align-items:center;justify-content:center;background:#111}
.render-view img{width:100%;height:100%;object-fit:contain;display:block}
.render-label{position:absolute;top:12px;left:12px;font-size:10px;font-weight:600;background:rgba(0,0,0,.5);color:#fff;padding:3px 8px;border-radius:4px;backdrop-filter:blur(4px);letter-spacing:.5px;text-transform:uppercase}

/* LOADING */
.loading{display:none;position:absolute;inset:0;background:rgba(26,26,26,.8);backdrop-filter:blur(6px);flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:20}
.loading.visible{display:flex}
.spinner{width:36px;height:36px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:rgba(255,255,255,.8)}
.loading-sub{font-size:11px;color:rgba(255,255,255,.4)}

/* CANVAS BOTTOM ACTIONS */
.canvas-actions{position:absolute;bottom:20px;right:20px;display:none;gap:8px;z-index:15}
.canvas-actions.visible{display:flex}
.caction{background:rgba(0,0,0,.6);border:none;color:#fff;padding:7px 14px;border-radius:7px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;backdrop-filter:blur(4px);display:flex;align-items:center;gap:6px;transition:all .2s}
.caction:hover{background:rgba(0,0,0,.8)}

/* RIGHT PANEL */
.rpanel{width:var(--panel);background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;scrollbar-width:none}
.rpanel::-webkit-scrollbar{display:none}

/* PROFILE */
.profile-section{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.profile-avatar{width:32px;height:32px;border-radius:50%;background:#e0e0e0;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.profile-info{flex:1}
.profile-name{font-size:13px;font-weight:600}
.profile-email{font-size:11px;color:var(--muted)}

/* API KEY */
.api-section{padding:12px 16px;border-bottom:1px solid var(--border)}
.sec-label{font-size:11px;font-weight:600;color:var(--text);margin-bottom:8px;letter-spacing:.2px}
.api-input{width:100%;background:#f5f5f3;border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:7px;font-size:11px;font-family:monospace;outline:none;transition:border-color .2s}
.api-input:focus{border-color:#1a1a1a}
.api-input::placeholder{color:var(--light)}

/* OPTION SECTIONS */
.opt-section{padding:14px 16px;border-bottom:1px solid var(--border)}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.opt-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.opt-btn{padding:8px 6px;border-radius:7px;border:1px solid var(--border);background:var(--white);color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;font-weight:400;white-space:nowrap}
.opt-btn:hover{border-color:#aaa}
.opt-btn.sel{background:#1a1a1a;border-color:#1a1a1a;color:#fff;font-weight:500}

/* INSTRUCTIONS */
.inst-input{width:100%;background:#f5f5f3;border:1px solid var(--border);color:var(--text);padding:9px 10px;border-radius:7px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;resize:none;min-height:80px;transition:border-color .2s;line-height:1.5}
.inst-input:focus{border-color:#1a1a1a}
.inst-input::placeholder{color:var(--light)}

/* ERROR */
.errmsg{display:none;margin:0 16px 10px;padding:9px 12px;background:#fff5f5;border:1px solid #fcd0d0;border-radius:7px;font-size:12px;color:#c0392b;line-height:1.5}
.errmsg.visible{display:block}

/* RENDER BUTTON */
.render-wrap{padding:14px 16px;position:sticky;bottom:0;background:var(--white);border-top:1px solid var(--border);margin-top:auto}
.render-btn{width:100%;padding:13px;background:#1a1a1a;color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.render-btn:hover{background:#333}
.render-btn:disabled{opacity:.35;cursor:not-allowed}
.render-icon{font-size:14px}

#fi{display:none}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo"><span>R</span></div>
  <span class="logo-name">RenderAI</span>
  <div class="hright">
    <div class="avatar-wrap">
      <div class="avatar">👤</div>
      <div>
        <div class="avatar-name">isstudio012</div>
        <div class="avatar-email">hello@isstudio.ai</div>
      </div>
    </div>
  </div>
</header>

<div class="app">

  <!-- LEFT PROJECT PANEL -->
  <div class="lbar">
    <div class="lbar-header">
      <span class="lbar-title">Scenes</span>
      <button class="lbtn" id="upload-lbtn" title="새 씬 추가">+</button>
    </div>
    <div class="project-list" id="project-list">
      <!-- populated by JS -->
    </div>
    <div class="lbar-add" id="lbar-add-btn">
      <span>+</span> 씬 추가
    </div>
  </div>

  <!-- CENTER -->
  <div class="center">

    <!-- THUMBNAILS -->
    <div class="thumbbar">
      <button class="tnav">‹</button>
      <div class="thumbs-wrap" id="thumbs-wrap">
        <!-- populated by JS -->
      </div>
      <button class="thumb-add" id="thumb-add-btn">+</button>
      <button class="tnav">›</button>
    </div>

    <!-- CANVAS WRAP -->
    <div class="canvas-wrap">

      <!-- UPLOAD STATE -->
      <div class="upload-zone" id="upload-zone">
        <div class="upload-icon">🏠</div>
        <h3>씬을 업로드하세요</h3>
        <p>SketchUp, Revit, 3ds Max, Rhino<br>스케치 또는 사진</p>
        <small>Click to upload scenes</small>
      </div>

      <!-- CANVAS WITH SINGLE RENDER VIEW -->
      <div class="canvas" id="canvas">
        <div class="render-view" id="render-view">
          <img id="rendered-img" src="" alt="렌더링">
          <div class="render-label" id="render-label"></div>
        </div>

        <!-- LOADING -->
        <div class="loading" id="loading">
          <div class="spinner"></div>
          <div class="loading-text">렌더링 생성 중...</div>
          <div class="loading-sub">약 30~60초 소요됩니다</div>
        </div>

        <!-- CANVAS ACTIONS -->
        <div class="canvas-actions" id="canvas-actions">
          <button class="caction" id="download-btn">⬇ 다운로드</button>
          <button class="caction" id="new-render-btn">+ 새 씬</button>
        </div>
      </div>

    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="rpanel">

    <!-- PROFILE -->
    <div class="profile-section">
      <div class="profile-avatar">🏠</div>
      <div class="profile-info">
        <div class="profile-name">RenderAI</div>
        <div class="profile-email">hello@renderai.app</div>
      </div>
    </div>

    <!-- API KEY -->
    <div class="api-section">
      <div class="sec-label">Replicate API Key</div>
      <input type="password" class="api-input" id="api-key" placeholder="r8_xxxxxxxxxxxxxxxxxxxx">
    </div>

    <!-- TIME OF DAY -->
    <div class="opt-section">
      <div class="sec-label">Time of Day</div>
      <div class="opt-grid">
        <button class="opt-btn sel" data-g="time" data-v="morning 7AM warm golden sunlight at low angle streaming through windows, long interior shadows, outside windows: bright blue morning sky with soft golden sunrise light, green landscape lit by morning sun">🌅 Morning</button>
        <button class="opt-btn" data-g="time" data-v="noon 12PM intense white overhead sunlight flooding interior, sharp shadows, outside windows: bright clear blue sky, harsh midday sunlight on exterior landscape, vivid green grass">☀️ Noon</button>
        <button class="opt-btn" data-g="time" data-v="sunset evening 6PM deep golden orange warm light, long dramatic shadows inside, outside windows: dramatic orange red sunset sky, golden hour light on exterior, warm amber atmosphere">🌆 Evening</button>
        <button class="opt-btn" data-g="time" data-v="night time, interior track lights and artificial ceiling lights ON creating warm light pools, outside windows: completely dark night black sky, dark exterior landscape, no sunlight outside, high contrast bright interior vs dark exterior">🌙 Night</button>
      </div>
    </div>

    <!-- LIGHTING -->
    <div class="opt-section">
      <div class="sec-label">Lighting</div>
      <div class="opt-grid-3">
        <button class="opt-btn sel" data-g="lighting" data-v="natural daylight through windows">Daylight</button>
        <button class="opt-btn sel" data-g="lighting" data-v="soft ambient lighting, diffused">Ambient</button>
        <button class="opt-btn sel" data-g="lighting" data-v="cove lighting, indirect LED">Cove</button>
        <button class="opt-btn" data-g="lighting" data-v="spot lighting, accent spotlights">Spot</button>
        <button class="opt-btn" data-g="lighting" data-v="track lighting, directional">Track</button>
        <button class="opt-btn" data-g="lighting" data-v="profile lighting, wall-mounted">Profile</button>
      </div>
    </div>

    <!-- FLOORING -->
    <div class="opt-section">
      <div class="sec-label">Flooring</div>
      <div class="opt-grid-3">
        <button class="opt-btn" data-g="floor" data-v="marble flooring, polished white marble">Marble</button>
        <button class="opt-btn sel" data-g="floor" data-v="hardwood flooring, oak wood planks">Wood</button>
        <button class="opt-btn" data-g="floor" data-v="ceramic tile flooring, large format">Tile</button>
        <button class="opt-btn" data-g="floor" data-v="granite flooring, polished granite">Granite</button>
        <button class="opt-btn" data-g="floor" data-v="carpet flooring, soft area rug">Carpet</button>
        <button class="opt-btn" data-g="floor" data-v="polished concrete flooring">Concrete</button>
      </div>
    </div>

    <!-- ADDITIONAL INSTRUCTIONS -->
    <div class="opt-section">
      <div class="sec-label">Additional Instructions</div>
      <textarea class="inst-input" id="instructions" placeholder="Enter any specific requirements or preferences"></textarea>
    </div>

    <!-- ERROR -->
    <div class="errmsg" id="errmsg"></div>

    <!-- RENDER BUTTON -->
    <div class="render-wrap">
      <button class="render-btn" id="render-btn" disabled>
        <span class="render-icon">✦</span> Render
      </button>
    </div>

  </div>
</div>

<input type="file" id="fi" accept="image/*">

<script>
// 씬 관리
let scenes = []; // {id, orig, rendered, name}
let currentSceneId = null;
let isDragging = false;

const uploadZone = document.getElementById('upload-zone');
const canvas = document.getElementById('canvas');
const originalImg = document.getElementById('original-img');
const renderedImg = document.getElementById('rendered-img');
const renderedLayer = document.getElementById('rendered-layer');
const compareLine = document.getElementById('compare-line');
const loading = document.getElementById('loading');
const renderBtn = document.getElementById('render-btn');
const fi = document.getElementById('fi');
const apiKey = document.getElementById('api-key');
const errmsg = document.getElementById('errmsg');
const downloadBtn = document.getElementById('download-btn');
const newRenderBtn = document.getElementById('new-render-btn');
const canvasActions = document.getElementById('canvas-actions');
const thumbsWrap = document.getElementById('thumbs-wrap');

// 현재 씬
function currentScene() { return scenes.find(s => s.id === currentSceneId); }

// UPLOAD TRIGGERS
uploadZone.addEventListener('click', () => fi.click());
document.getElementById('upload-lbtn').addEventListener('click', () => fi.click());
document.getElementById('lbar-add-btn').addEventListener('click', () => fi.click());
document.getElementById('thumb-add-btn').addEventListener('click', () => { fi.click(); });

document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadFile(f);
});

fi.addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
  fi.value = '';
});

function loadFile(f) {
  const reader = new FileReader();
  reader.onload = e => {
    const b64 = e.target.result;
    const id = Date.now();
    const scene = { id, orig: b64, rendered: null, name: `Scene ${scenes.length + 1}` };
    scenes.push(scene);
    currentSceneId = id;
    showScene(scene);
    renderThumbs();
    clearErr();
    checkReady();
  };
  reader.readAsDataURL(f);
}

function showScene(scene, viewMode = 'rendered') {
  uploadZone.style.display = 'none';
  canvas.classList.add('visible');

  const renderedImg = document.getElementById('rendered-img');
  const renderLabel = document.getElementById('render-label');

  if (viewMode === 'orig' || !scene.rendered) {
    renderedImg.src = scene.orig;
    renderLabel.textContent = 'Original';
  } else {
    renderedImg.src = scene.rendered;
    renderLabel.textContent = 'Rendered';
  }

  if (scene.rendered) {
    canvasActions.classList.add('visible');
  } else {
    canvasActions.classList.remove('visible');
  }
}

// THUMBNAILS + PROJECT LIST
function renderThumbs() {
  thumbsWrap.innerHTML = '';
  const projectList = document.getElementById('project-list');
  projectList.innerHTML = '';

  scenes.forEach((scene, i) => {
    // 원본 썸네일
    const tOrig = document.createElement('div');
    tOrig.className = 'thumb';
    tOrig.innerHTML = `<img src="${scene.orig}"><div class="thumb-num">${i+1}</div><div class="thumb-badge orig">원본</div>`;
    tOrig.addEventListener('click', () => {
      currentSceneId = scene.id;
      showScene(scene, 'orig');
      renderThumbs();
      checkReady();
    });
    thumbsWrap.appendChild(tOrig);

    // 렌더링 썸네일 (있을 때만)
    if (scene.rendered) {
      const tRend = document.createElement('div');
      tRend.className = 'thumb' + (scene.id === currentSceneId ? ' active' : '');
      tRend.innerHTML = `<img src="${scene.rendered}"><div class="thumb-num">${i+1}</div><div class="thumb-badge rendered">렌더</div>`;
      tRend.addEventListener('click', () => {
        currentSceneId = scene.id;
        showScene(scene, 'rendered');
        renderThumbs();
        checkReady();
      });
      thumbsWrap.appendChild(tRend);
    }

    // 왼쪽 프로젝트 목록
    const p = document.createElement('div');
    p.className = 'project-item' + (scene.id === currentSceneId ? ' active' : '');
    const imgSrc = scene.rendered || scene.orig;
    p.innerHTML = `<img src="${imgSrc}"><div class="project-item-label">Scene ${i + 1}${scene.rendered ? ' ✓' : ''}</div>`;
    p.addEventListener('click', () => {
      currentSceneId = scene.id;
      showScene(scene, scene.rendered ? 'rendered' : 'orig');
      renderThumbs();
      checkReady();
    });
    projectList.appendChild(p);
  });
}

// OPTION BUTTONS
document.querySelectorAll('.opt-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const g = btn.dataset.g;
    if (g === 'lighting') {
      btn.classList.toggle('sel');
    } else {
      document.querySelectorAll(`.opt-btn[data-g="${g}"]`).forEach(b => b.classList.remove('sel'));
      btn.classList.add('sel');
    }
  });
});

// API 키 자동 저장/불러오기
const savedKey = localStorage.getItem('replicate_api_key');
if (savedKey) apiKey.value = savedKey;

apiKey.addEventListener('input', () => {
  localStorage.setItem('replicate_api_key', apiKey.value.trim());
  checkReady();
});

function checkReady() {
  const scene = currentScene();
  renderBtn.disabled = !(scene && apiKey.value.trim().startsWith('r8_'));
}

function buildPrompt() {
  const time = document.querySelector('.opt-btn[data-g="time"].sel')?.dataset.v || '';
  const lights = [...document.querySelectorAll('.opt-btn[data-g="lighting"].sel')].map(b => b.dataset.v).join(', ');
  const floor = document.querySelector('.opt-btn[data-g="floor"].sel')?.dataset.v || '';
  const inst = document.getElementById('instructions').value.trim();
  return ['photorealistic architectural interior rendering, professional photography, ultra realistic, 8K', 'strong bright sunlight streaming through windows, intense natural light from exterior, sun rays entering interior, bright window light creating dramatic shadows on floor and walls, high contrast natural lighting', time, lights, floor, inst, 'high quality, sharp details, professional interior design visualization'].filter(Boolean).join(', ');
}

// RENDER
renderBtn.addEventListener('click', async () => {
  const key = apiKey.value.trim();
  const scene = currentScene();
  if (!key || !scene) return;
  clearErr();
  setLoading(true);

  try {
    // 원본 이미지 크기 읽기
    const imgEl = new Image();
    imgEl.src = scene.orig;
    await new Promise(r => { imgEl.onload = r; imgEl.onerror = r; });
    const w = imgEl.naturalWidth || 1280;
    const h = imgEl.naturalHeight || 720;

    const res = await fetch('/api/render', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ apiKey: key, prompt: buildPrompt(), image: scene.orig, strength: 0.75, width: w, height: h })
    });
    const pred = await res.json();
    if (!res.ok) throw new Error(pred.error || '렌더링 시작 실패');
    await poll(key, pred.id);
  } catch (e) {
    showErr('오류: ' + e.message);
    setLoading(false);
  }
});

async function poll(key, id) {
  while (true) {
    await new Promise(r => setTimeout(r, 2500));
    const res = await fetch('/api/poll', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ apiKey: key, predictionId: id })
    });
    const d = await res.json();
    if (d.status === 'succeeded') {
      const url = Array.isArray(d.output) ? d.output[0] : d.output;
      showResult(url);
      return;
    } else if (d.status === 'failed') {
      throw new Error(d.error || '렌더링 실패');
    }
  }
}

function showResult(url) {
  const scene = currentScene();
  if (!scene) return;
  scene.rendered = url;
  const renderedImg = document.getElementById('rendered-img');
  renderedImg.src = url;
  renderedImg.onload = () => {
    setLoading(false);
    document.getElementById('render-label').textContent = 'Rendered';
    canvasActions.classList.add('visible');
    renderThumbs();
  };
}

// DOWNLOAD
downloadBtn.addEventListener('click', () => {
  const scene = currentScene();
  if (!scene?.rendered) return;
  const a = document.createElement('a');
  a.href = scene.rendered;
  a.download = `renderai-scene${scenes.indexOf(scene)+1}.png`;
  a.target = '_blank';
  a.click();
});

// NEW SCENE
newRenderBtn.addEventListener('click', () => fi.click());

function setLoading(on) {
  if (on) {
    loading.classList.add('visible');
    renderBtn.disabled = true;
    renderBtn.innerHTML = '<span>⏳</span> 렌더링 중...';
  } else {
    loading.classList.remove('visible');
    renderBtn.disabled = false;
    renderBtn.innerHTML = '<span class="render-icon">✦</span> Render';
  }
}

function showErr(m) { errmsg.textContent = m; errmsg.classList.add('visible'); }
function clearErr() { errmsg.classList.remove('visible'); }
</script>
</body>
</html>
