<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VizMaker UI (Step 4)</title>
<style>
:root{--bg:#141414;--panel:#1c1c1c;--panel2:#232323;--line:#4a4a4a;--text:#f4f4f4;--muted:#b9b9b9}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:Inter,Arial,sans-serif;color:var(--text)}
button,input,select,textarea{font:inherit}
#app{width:100%;height:100%;display:grid;grid-template-columns:1fr 420px;grid-template-rows:1fr;}
#left{position:relative;overflow:hidden}
#right{border-left:1px solid #2b2b2b;background:#151515;display:flex;flex-direction:column}
#canvas{position:absolute;inset:0 0 108px 0;overflow:hidden;background:var(--bg)}
#canvas.panning{cursor:grabbing}
#world{position:absolute;top:0;left:0;width:4000px;height:4000px;transform-origin:top left;}
#connections{position:absolute;inset:0;pointer-events:none;z-index:999;width:100%;height:100%}
.toolbar{position:absolute;top:16px;right:16px;display:flex;gap:8px;z-index:20}
.tb{height:36px;padding:0 14px;border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:10px;cursor:pointer}.tb:hover{background:var(--panel2)}
.source-launcher{position:absolute;left:16px;top:16px;height:42px;min-width:120px;padding:0 18px;border:1px solid #d2b100;background:#ffd400;color:#111;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;cursor:grab;z-index:30;user-select:none;box-shadow:0 8px 24px rgba(0,0,0,.25)}
.source-launcher:active{cursor:grabbing}
.notice{position:absolute;bottom:124px;left:16px;padding:8px 12px;border-radius:10px;background:rgba(28,28,28,.95);border:1px solid var(--line);color:var(--muted);font-size:12px;z-index:20}

.node{position:absolute;min-width:260px;background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:0 12px 30px rgba(0,0,0,.25);user-select:none;transform-origin:top left;will-change:left,top;transition:box-shadow 0.15s}
.node.dragging{box-shadow:0 20px 48px rgba(0,0,0,.45);transition:none}
.node.source{min-width:360px;width:360px}
.node.engine{min-width:360px;width:360px}
.node-header{height:38px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;border-bottom:1px solid rgba(255,255,255,.06);cursor:grab}
.node-title{font-size:13px;color:var(--text)}
.node-actions{display:flex;gap:6px}
.icon-btn{width:24px;height:24px;border:none;background:transparent;color:#fff;cursor:pointer;border-radius:6px;font-size:14px}.icon-btn:hover{background:rgba(255,255,255,.08)}
.node-body{padding:12px}
.image-box{width:100%;height:180px;border-radius:14px;border:1px dashed rgba(255,255,255,.18);background:#171717;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;position:relative}
.node.source .image-box{height:250px}
.image-box img{width:100%;height:100%;object-fit:contain;display:none;background:#111}
.image-box.has-image img{display:block}
.image-box .ghost{font-size:13px;color:var(--muted);padding:0 12px;text-align:center}
.engine-preview{height:150px;margin-bottom:10px;cursor:zoom-in}
.engine-select{width:100%;height:42px;border-radius:12px;border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:0 12px;outline:none;margin-bottom:10px}
.prompt{width:100%;min-height:84px;border-radius:12px;border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:12px;outline:none;resize:none}
.prompt::placeholder{color:#d8d8d8}
.make{width:100%;height:42px;border:none;border-radius:12px;background:#efefef;color:#111;margin-top:10px;cursor:pointer;font-weight:600}
.make:hover{background:#fff}
.make:disabled{opacity:.45;cursor:not-allowed}
.upscale-btn{width:100%;height:34px;border:1px solid var(--line);border-radius:10px;background:transparent;color:#b9b9b9;margin-top:6px;cursor:pointer;font-size:12px;font-family:inherit}
.upscale-btn:hover{border-color:#ffd400;color:#ffd400}
.upscale-btn:disabled{opacity:.4;cursor:not-allowed}
.loading{font-size:12px;color:var(--muted);margin-top:8px;text-align:center;display:none}

.port{position:absolute;width:16px;height:16px;border-radius:999px;background:#fff;border:2px solid #1b1b1b;z-index:200;cursor:crosshair}
.port.in{left:-8px;top:50%;transform:translateY(-50%)}
.port.ref{left:-8px;top:65%;transform:translateY(-50%);background:#fff;border-color:#1b1b1b;outline:2px solid rgba(255,255,255,.25)}
.port.out{right:-8px;top:50%;transform:translateY(-50%)}
.port-label{position:absolute;font-size:9px;color:rgba(255,255,255,.45);white-space:nowrap;pointer-events:none}
.port.in  + .port-label{left:12px;top:50%;transform:translateY(-50%)}
.port.ref + .port-label{left:12px;top:65%;transform:translateY(-50%)}

.line-hit{pointer-events:stroke;cursor:pointer}
.fullscreen{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:50;cursor:zoom-out}
.fullscreen.on{display:flex}
.fullscreen img{max-width:92vw;max-height:90vh;object-fit:contain;border-radius:16px}
#fileInput{display:none}

.bottom-bar{position:absolute;left:18px;right:18px;bottom:18px;height:72px;display:flex;gap:12px;z-index:25}
.bottom-prompt{flex:1;height:100%;border:1px solid var(--line);border-radius:14px;background:rgba(44,44,44,.95);padding:14px 16px;color:var(--text);outline:none;resize:none}
.bottom-prompt::placeholder{color:#f2f2f2}
.bottom-make{width:128px;border:none;border-radius:14px;background:#ffd400;color:#111;cursor:pointer;font-weight:700}
.bottom-make:hover{filter:brightness(1.03)}
.bottom-make:disabled{opacity:.45;cursor:not-allowed}

/* Right preview */
.previewTop{padding:14px 14px 10px;border-bottom:1px solid #2b2b2b}
.previewTitle{font-size:14px;color:#fff}
.previewBox{margin:14px;border:1px solid #2b2b2b;border-radius:14px;background:#121212;overflow:hidden;display:flex;align-items:center;justify-content:center;height:360px;cursor:zoom-in}
.previewBox img{width:100%;height:100%;object-fit:contain;display:none;background:#000}
.previewEmpty{color:var(--muted);font-size:13px}

.link-remove{pointer-events:all;cursor:pointer}
.link-remove .hit{pointer-events:all;cursor:pointer}
.link-remove .vis{pointer-events:none}
.node.selected{outline:1px solid rgba(255,255,255,.28)}
.line-hit-fat{pointer-events:stroke;cursor:pointer}
#rightInner{padding:0 14px 14px;display:flex;flex-direction:column;gap:14px}
.side-card{width:100%}
.side-label{font-size:14px;color:#fff;margin:0 0 10px}
.side-input{width:100%;height:44px;border:1px solid var(--line);border-radius:12px;background:var(--panel2);color:var(--text);padding:0 12px;outline:none;display:block}
.side-input:focus{border-color:#666}

</style>
</head>
<body>
<div id="app">
  <div id="left">
    <div class="toolbar">
      <button class="tb" id="zoomOut">−</button>
      <button class="tb" id="zoomReset">100%</button>
      <button class="tb" id="zoomIn">+</button>
      <button class="tb" id="resetWs" title="워크스페이스 초기화">↺</button>
    </div>
    <div id="canvas"><div id="world"><svg id="connections"></svg></div></div>
    <div id="sourceLauncher" class="source-launcher">+ Source</div>
    <div class="bottom-bar">
      <textarea id="bottomPrompt" class="bottom-prompt" placeholder="Prompt"></textarea>
      <button id="bottomMake" class="bottom-make">Make</button>
    </div>
  </div>

  <div id="right">
    <div id="rightInner">
      <div class="side-card">
        <div class="side-label">Preview</div>
        <div class="previewBox" id="previewBox">
          <div class="previewEmpty" id="previewEmpty">미리보기</div>
          <img id="previewImg" alt="" />
        </div>
      </div>
      <div class="side-card">
        <div class="side-label">API Code</div>
        <input id="apiCode" class="side-input" type="password" placeholder="r8_xxxxxxxx..." maxlength="50" autocomplete="off" spellcheck="false" />
      </div>
    </div>
  </div>
</div>

<input id="fileInput" type="file" accept="image/*" />
<div id="fullscreen" class="fullscreen"><img id="fullscreenImg" alt="" /></div>

<script>
const canvas = document.getElementById('canvas');
const world = document.getElementById('world');
world.style.transformOrigin = 'top left';
world.style.transform = 'scale(1)';
world.style.left = '0px';
world.style.top = '0px';
const svg = document.getElementById('connections');
const fileInput = document.getElementById('fileInput');
const fullscreen = document.getElementById('fullscreen');
const fullscreenImg = document.getElementById('fullscreenImg');
const bottomPrompt = document.getElementById('bottomPrompt');
const bottomMake = document.getElementById('bottomMake');
const previewBox = document.getElementById('previewBox');
const previewImg = document.getElementById('previewImg');
const previewEmpty = document.getElementById('previewEmpty');
const apiCodeInput = document.getElementById('apiCode');
const sourceLauncher = document.getElementById('sourceLauncher');

let nodes = [], links = [];
let zCounter = 5;
let drag = null;
let pendingUploadNode = null;
let connectStart = null;
let tempMouse = null;
let selectedLink = null;
let selectedEngineId = null;
let selectedNodeId = null;
let canvasZoom = 1;
let panMode = null;
let sourceLauncherDrag = null;


const API_RENDER = '/api/render';
const LS_API_KEY = 'vizmaker_api_code_v1';
const LS_WORKSPACE = 'vizmaker_workspace_v3';
apiCodeInput.value = (localStorage.getItem(LS_API_KEY) || '').trim();
apiCodeInput.addEventListener('input', ()=> localStorage.setItem(LS_API_KEY, apiCodeInput.value.trim()));
apiCodeInput.addEventListener('paste', e=>{
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData('text').trim();
  apiCodeInput.value = text;
  localStorage.setItem(LS_API_KEY, text);
});

function saveWorkspace(){
  try{
    // 이미지는 별도 키로 저장 (용량 분리)
    const imageMap = {};
    nodes.forEach(n => {
      if(n.image) imageMap[n.id + '_img'] = n.image;
      if(n.previewImage) imageMap[n.id + '_prev'] = n.previewImage;
    });
    try{ localStorage.setItem(LS_WORKSPACE + '_images', JSON.stringify(imageMap)); }catch(_e){}

    // 노드에서 이미지 제거 후 저장
    const nodesLight = nodes.map(n => {
      const copy = {...n};
      delete copy.image;
      delete copy.previewImage;
      return copy;
    });

    const payload = {
      nodes: nodesLight,
      links,
      zCounter,
      selectedNodeId,
      selectedEngineId,
      canvasZoom,
      canvasLeft: world.style.left || '0px',
      canvasTop: world.style.top || '0px',
      bottomPrompt: bottomPrompt.value || '',
      sourceLauncherLeft: sourceLauncher ? (sourceLauncher.style.left || '16px') : '16px',
      sourceLauncherTop:  sourceLauncher ? (sourceLauncher.style.top  || '16px') : '16px'
    };
    localStorage.setItem(LS_WORKSPACE, JSON.stringify(payload));
  }catch(_e){}
}

function restoreWorkspace(){
  try{
    const raw = localStorage.getItem(LS_WORKSPACE);
    if(!raw) return false;
    const data = JSON.parse(raw);
    if(!data || !Array.isArray(data.nodes) || !Array.isArray(data.links)) return false;

    // 이미지 복원
    let imageMap = {};
    try{ imageMap = JSON.parse(localStorage.getItem(LS_WORKSPACE + '_images') || '{}'); }catch(_e){}

    nodes = data.nodes.map(n => {
      const copy = {...n};
      if(imageMap[n.id + '_img'])  copy.image = imageMap[n.id + '_img'];
      if(imageMap[n.id + '_prev']) copy.previewImage = imageMap[n.id + '_prev'];
      return copy;
    });
    links = data.links || [];

    // Keep exactly one engine node. Remove any extra engines from broken saved states.
    const engineNodes = nodes.filter(n => n.type === 'engine');
    let baseEngine = null;
    if (engineNodes.length) {
      baseEngine = engineNodes.find(n => n.locked) || engineNodes[0];
      baseEngine.locked = true;
      const keepId = baseEngine.id;
      nodes = nodes.filter(n => n.type !== 'engine' || n.id === keepId);
      links = links.filter(l => l.from !== undefined && l.to !== undefined).filter(l => {
        const fromNode = nodes.find(n => n.id === l.from);
        const toNode = nodes.find(n => n.id === l.to);
        return !!fromNode && !!toNode;
      });
    } else {
      baseEngine = {
        id: uid('eng_'),
        type: 'engine',
        x: 760,
        y: 150,
        engine: 'Flux Kontext Pro',
        prompt: data.bottomPrompt || '',
        previewImage: null,
        locked: true
      };
      nodes.push(baseEngine);
    }

    zCounter = Number(data.zCounter || 5);
    selectedNodeId = data.selectedNodeId || null;
    selectedEngineId = baseEngine.id;

    world.style.left = data.canvasLeft || '0px';
    world.style.top = data.canvasTop || '0px';
    if (typeof sourceLauncher !== 'undefined' && sourceLauncher) {
      sourceLauncher.style.left = data.sourceLauncherLeft || '16px';
      sourceLauncher.style.top = data.sourceLauncherTop || '16px';
    }

    document.querySelectorAll('.node').forEach(el => el.remove());
    nodes.forEach(renderNode);
    syncAllEnginePreviews();
    redraw();

    setCanvasZoom(typeof data.canvasZoom === 'number' ? data.canvasZoom : 1);

    if (selectedNodeId && nodes.find(n => n.id === selectedNodeId)) {
      selectNode(selectedNodeId);
    } else {
      selectNode(baseEngine.id);
    }

    selectEngine(baseEngine.id);
    return true;
  }catch(_e){
    return false;
  }
}

function uid(prefix='n'){ return prefix + Math.random().toString(36).slice(2,9); }

function getNextSourcePosition(){
  const sources = nodes.filter(n=>n.type==='source').sort((a,b)=>a.y-b.y);
  const leftX = 28;
  const topY = 120;
  const gapY = 290;
  return { x: leftX, y: topY + sources.length * gapY };
}

function renderNode(node){
  const el = document.createElement('div');
  el.className = 'node' + (node.type==='engine' ? ' engine' : '') + (node.type==='source' ? ' source' : '');
  el.id = node.id;
  el.style.left = node.x + 'px';
  el.style.top = node.y + 'px';

  if(node.type==='source'){
    el.innerHTML = `
      <div class="node-header">
        <div class="node-title">Source</div>
        <div class="node-actions"><button class="icon-btn delete-node">×</button></div>
      </div>
      <div class="node-body">
        <div class="image-box source-box ${node.image?'has-image':''}">
          <img src="${node.image||''}">
          <div class="ghost">Image</div>
        </div>
      </div>
      <div class="port out" data-port="out"></div>`;
  }

  if(node.type==='engine'){
    el.innerHTML = `
      <div class="node-header">
        <div class="node-title">Engine</div>
        <div class="node-actions"><button class="icon-btn duplicate-node" title="Copy">⧉</button>${node.locked ? '' : '<button class="icon-btn delete-node">×</button>'}</div>
      </div>
      <div class="node-body">
        <div class="image-box engine-preview ${node.previewImage?'has-image':''}">
          <img src="${node.previewImage||''}">
          <div class="ghost">Image</div>
        </div>
        <select class="engine-select">
          <option>Flux Kontext Pro</option>
          <option>Nano Banana 2</option>
          <option>Image Engine</option>
        </select>
        <textarea class="prompt" placeholder="Prompt"></textarea>
        <button class="upscale-btn">4K Upscale</button>
        <div class="loading">Rendering...</div>
      </div>
      <div class="port in" data-port="in"></div><span class="port-label" style="left:12px;top:50%;transform:translateY(-50%);position:absolute;font-size:9px;color:rgba(255,255,255,.4);pointer-events:none">Main</span>
      <div class="port ref" data-port="ref"></div><span class="port-label" style="left:12px;top:65%;transform:translateY(-50%);position:absolute;font-size:9px;color:rgba(255,255,255,.4);pointer-events:none">Ref</span>
      <div class="port out" data-port="out"></div>`;
  }

  if(node.type==='result'){
    el.innerHTML = `
      <div class="node-header">
        <div class="node-title">Result</div>
        <div class="node-actions"><button class="icon-btn delete-node">×</button></div>
      </div>
      <div class="node-body">
        <div class="image-box result-box ${node.image?'has-image':''}">
          <img src="${node.image||''}">
          <div class="ghost">Image</div>
        </div>
      </div>
      <div class="port in" data-port="in"></div>`;
  }

  if(node.type==='final'){
    el.innerHTML = `
      <div class="node-header">
        <div class="node-title">최종</div>
        <div class="node-actions"><button class="icon-btn delete-node">×</button></div>
      </div>
      <div class="node-body">
        <div class="image-box result-box ${node.image?'has-image':''}">
          <img src="${node.image||''}">
          <div class="ghost">Image</div>
        </div>
      </div>
      <div class="port in" data-port="in"></div>`;
  }

  world.appendChild(el);
  if(node.type==='engine'){
    const sel = el.querySelector('.engine-select');
    const ta = el.querySelector('.prompt');
    if(sel) sel.value = node.engine || 'Flux Kontext Pro';
    if(ta) ta.value = node.prompt || '';
  }
  bindNodeEvents(node, el);
  bringToFront(el);
  redraw();
}

function addSourceNode(x,y){
  const pos = (typeof x === 'number' && typeof y === 'number') ? {x,y} : getNextSourcePosition();
  const n={id:uid('src_'),type:'source',x:pos.x,y:pos.y,image:null};
  nodes.push(n);
  renderNode(n);
  selectNode(n.id);
  saveWorkspace();
}

function addEngineNode(x=760,y=150){
  const n={id:uid('eng_'),type:'engine',x,y,engine:'Flux Kontext Pro',prompt:'',previewImage:null, locked:true};
  nodes.push(n);
  renderNode(n);
  selectNode(n.id);
  selectEngine(n.id);
  saveWorkspace();
}

function addImageNode(type, x, y, image){
  const n={id:uid(type==='final'?'fin_':'res_'),type,x,y,image};
  nodes.push(n);
  renderNode(n);
  return n;
}

function bindNodeEvents(node, el){
  el.addEventListener('mousedown', ()=>{
    selectNode(node.id);
    if(node.type==='engine') selectEngine(node.id);
  });

  const startNodeDrag = (e) => {
    if (e.button !== 0) return;
    if (e.target.closest('.icon-btn, .port, select, textarea, button, input, .link-remove')) return;
    const left = parseFloat(world.style.left || '0') || 0;
    const top  = parseFloat(world.style.top  || '0') || 0;
    const canvasRect = canvas.getBoundingClientRect();
    drag={
      id: node.id,
      canvasOriginX: canvasRect.left,
      canvasOriginY: canvasRect.top,
      offsetX: (e.clientX - canvasRect.left - left) / canvasZoom - node.x,
      offsetY: (e.clientY - canvasRect.top  - top)  / canvasZoom - node.y
    };
    bringToFront(el);
    el.classList.add('dragging');
    e.preventDefault();
  };

  el.querySelector('.node-header').addEventListener('mousedown', startNodeDrag);
  el.querySelector('.node-body')?.addEventListener('mousedown', startNodeDrag);

  if(node.type==='source' || node.type==='result' || node.type==='final' || (node.type==='engine' && !node.locked)){
    el.querySelector('.delete-node')?.addEventListener('click', e=>{e.stopPropagation(); removeNode(node.id);});
  }
  el.querySelector('.duplicate-node')?.addEventListener('click', e=>{e.stopPropagation(); duplicateEngineNode(node.id);});

  if(node.type==='source'){
    el.querySelector('.source-box').addEventListener('click', e=>{
      e.stopPropagation();
      if(node.image) return;
      pendingUploadNode=node.id;
      fileInput.click();
    });
  }

  if(node.type==='engine'){
    el.querySelector('.engine-preview').addEventListener('click', e=>{
      e.stopPropagation();
      selectNode(node.id);
      if(node.previewImage) openImagePopup(node.previewImage, 'Preview');
    });
    const sel = el.querySelector('.engine-select');
    const ta = el.querySelector('.prompt');
    sel.value = node.engine;
    ta.value = node.prompt;
    sel.addEventListener('change', ()=>node.engine=sel.value);
    ta.addEventListener('input', ()=>{
      node.prompt = ta.value;
      if(selectedEngineId===node.id) bottomPrompt.value = node.prompt;
    });

    el.querySelector('.upscale-btn').addEventListener('click', e=>{
      e.stopPropagation();
      runUpscale(node.id);
    });
  }

  if(node.type==='result' || node.type==='final'){
    el.querySelector('.result-box').addEventListener('click', e=>{
      e.stopPropagation();
      selectNode(node.id);
      if(node.image){
        showPreview(node.image);
        openImagePopup(node.image, node.type==='final' ? 'Final Image' : 'Result Image');
      }
    });
  }

  // Ports
  el.querySelectorAll('.port').forEach(port=>{
    port.addEventListener('pointerdown', e=>{
      e.stopPropagation();
      e.preventDefault();
      selectedLink = null;
      connectStart = {nodeId: node.id, port: port.dataset.port};
    });
    port.addEventListener('mouseenter', ()=>{
      if(connectStart && connectStart.nodeId !== node.id) port.style.background = '#ffd400';
    });
    port.addEventListener('mouseleave', ()=>{ port.style.background = ''; });
    port.addEventListener('pointerup', e=>{
      e.stopPropagation();
      e.preventDefault();
      port.style.background = '';
      if(!connectStart) return;
      if(connectStart.nodeId === node.id){ connectStart=null; tempMouse=null; redraw(); return; }
      const fromPort = connectStart.port;
      const toPort = port.dataset.port;
      if(fromPort==='out' && (toPort==='in' || toPort==='ref')){
        links = links.filter(l => !(l.to===node.id && l.toPort===toPort));
        links.push({id:uid('ln_'), from:connectStart.nodeId, to:node.id, toPort});
      }
      connectStart=null; tempMouse=null;
      syncAllEnginePreviews(); redraw(); saveWorkspace();
    }, true);
  });
}

function bringToFront(el){ zCounter += 1; el.style.zIndex = zCounter; }

function duplicateEngineNode(id){
  const node = nodes.find(n=>n.id===id);
  if(!node || node.type!=='engine') return;

  const copy = {
    id: uid('eng_'),
    type: 'engine',
    x: node.x + 420,
    y: node.y + 20,
    engine: node.engine || 'Flux Kontext Pro',
    prompt: node.prompt || '',
    previewImage: node.previewImage || null,
    locked: false
  };
  nodes.push(copy);
  renderNode(copy);

  // Copy only node state and rendered output, not input links.
  // This lets the user branch from the same rendered state without reconnecting everything.
  const downstreamResult = findDownstream(node.id, 'result');
  const downstreamFinal = findDownstream(node.id, 'final');
  const downstream = downstreamFinal || downstreamResult;

  if(downstream && downstream.image){
    const clonedImageNode = {
      id: uid(downstream.type === 'final' ? 'fin_' : 'res_'),
      type: downstream.type,
      x: copy.x + 420,
      y: copy.y + 10,
      image: downstream.image
    };
    nodes.push(clonedImageNode);
    renderNode(clonedImageNode);

    links.push({
      id: uid('ln_'),
      from: copy.id,
      to: clonedImageNode.id,
      toPort: 'in'
    });
  }

  selectNode(copy.id);
  selectEngine(copy.id);
  redraw();
  saveWorkspace();
}

function removeNode(id){
  const targetNode = nodes.find(n=>n.id===id);
  if(targetNode && targetNode.type==='engine' && targetNode.locked) return;
  links = links.filter(l=>l.from!==id && l.to!==id);
  nodes = nodes.filter(n=>n.id!==id);
  document.getElementById(id)?.remove();
  if(selectedEngineId===id) selectEngine(null);
  if(selectedNodeId===id) selectedNodeId = null;
  syncAllEnginePreviews();
  redraw();
  saveWorkspace();
}

function removeLink(id){
  links = links.filter(l=>l.id!==id);
  if(selectedLink===id) selectedLink=null;
  syncAllEnginePreviews();
  redraw();
  saveWorkspace();
}

function getNodeRect(node){
  const el=document.getElementById(node.id);
  if(!el) return {w:360,h:300};
  return {w:el.offsetWidth,h:el.offsetHeight};
}

function getPortPos(nodeId, kind){
  const node=nodes.find(n=>n.id===nodeId);
  if(!node) return {x:0,y:0};
  const rect=getNodeRect(node);
  if(kind==='out') return {x:node.x+rect.w, y:node.y+rect.h/2};
  return {x:node.x, y:node.y+rect.h/2};
}

function getPortPosTo(nodeId, toPort){
  const node=nodes.find(n=>n.id===nodeId);
  if(!node) return {x:0,y:0};
  const rect=getNodeRect(node);
  const y = toPort==='ref' ? (node.y + rect.h*0.65) : (node.y + rect.h*0.5);
  return {x:node.x, y};
}

function syncEnginePreview(engineNode){
  const mainLink = links.find(l=>l.to===engineNode.id && l.toPort==='in');
  let img = null;
  if(mainLink){
    const src = nodes.find(n=>n.id===mainLink.from);
    img = src?.image || null;
  }
  engineNode.previewImage = img;
  const el = document.getElementById(engineNode.id);
  if(el){
    const box = el.querySelector('.engine-preview');
    const im = el.querySelector('.engine-preview img');
    im.src = img || '';
    box.classList.toggle('has-image', !!img);
    applyEnginePreviewAspect(engineNode, img);
  }
  if(selectedNodeId===engineNode.id){ if(img) showPreview(img); else clearPreview(); }
}

function syncAllEnginePreviews(){ nodes.filter(n=>n.type==='engine').forEach(syncEnginePreview); }

function redraw(){
  svg.setAttribute('width', 4000);
  svg.setAttribute('height', 4000);
  svg.innerHTML='';

  // Center crosshair
  const left = parseFloat(world.style.left||'0')||0;
  const top  = parseFloat(world.style.top ||'0')||0;
  const rect = canvas.getBoundingClientRect();
  const crossX = (rect.width/2  - left) / canvasZoom;
  const crossY = (rect.height/2 - top)  / canvasZoom;
  const crossSize = 12 / canvasZoom;
  const crossStroke = 1.5 / canvasZoom;
  const ch = document.createElementNS('http://www.w3.org/2000/svg','line');
  ch.setAttribute('x1', crossX - crossSize); ch.setAttribute('y1', crossY);
  ch.setAttribute('x2', crossX + crossSize); ch.setAttribute('y2', crossY);
  ch.setAttribute('stroke','rgba(255,255,255,0.35)'); ch.setAttribute('stroke-width', crossStroke);
  const cv = document.createElementNS('http://www.w3.org/2000/svg','line');
  cv.setAttribute('x1', crossX); cv.setAttribute('y1', crossY - crossSize);
  cv.setAttribute('x2', crossX); cv.setAttribute('y2', crossY + crossSize);
  cv.setAttribute('stroke','rgba(255,255,255,0.35)'); cv.setAttribute('stroke-width', crossStroke);
  svg.appendChild(ch); svg.appendChild(cv);

  // Update ghosts
  document.querySelectorAll('.ghost').forEach(g=>{
    const box=g.parentElement;
    g.style.display = box.classList.contains('has-image') ? 'none' : 'block';
  });

  // Draw links
  links.forEach(link=>{
    const from = getPortPos(link.from, 'out');
    const to = getPortPosTo(link.to, link.toPort);
    const mx = (from.x + to.x) / 2;
    const d = `M ${from.x} ${from.y} C ${mx} ${from.y}, ${mx} ${to.y}, ${to.x} ${to.y}`;

    // visible line
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', d);
    path.setAttribute('fill','none');
    path.setAttribute('stroke', selectedLink===link.id ? '#ffffff' : '#ffd400');
    path.setAttribute('stroke-width', selectedLink===link.id ? '3' : '2');
    path.style.pointerEvents='none';
    svg.appendChild(path);

    // fat invisible hit area — must come after so it's on top
    const fat = document.createElementNS('http://www.w3.org/2000/svg','path');
    fat.setAttribute('d', d);
    fat.setAttribute('fill','none');
    fat.setAttribute('stroke','transparent');
    fat.setAttribute('stroke-width','24');
    fat.style.pointerEvents='stroke';
    fat.style.cursor='pointer';
    fat.addEventListener('mouseenter', ()=>{ path.setAttribute('stroke','#ffffff'); });
    fat.addEventListener('mouseleave', ()=>{ path.setAttribute('stroke', selectedLink===link.id ? '#ffffff' : '#ffd400'); });
    fat.addEventListener('click', e=>{ e.stopPropagation(); selectedLink=link.id; redraw(); });
    svg.appendChild(fat);
  });

  // temp line
  if(connectStart && tempMouse){
    const from = getPortPos(connectStart.nodeId, connectStart.port);
    const mx = (from.x + tempMouse.x) / 2;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M ${from.x} ${from.y} C ${mx} ${from.y}, ${mx} ${tempMouse.y}, ${tempMouse.x} ${tempMouse.y}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke','#ffffff');
    path.setAttribute('stroke-width','2');
    path.setAttribute('stroke-dasharray','5 5');
    svg.appendChild(path);
  }
}

function applyEnginePreviewAspect(engineNode, imgSrc){
  const el = document.getElementById(engineNode.id);
  if(!el) return;
  const box = el.querySelector('.engine-preview');
  if(!box) return;

  if(!imgSrc){
    box.style.aspectRatio = '';
    box.style.height = '150px';
    return;
  }

  const probe = new Image();
  probe.onload = () => {
    if (probe.naturalWidth && probe.naturalHeight) {
      box.style.aspectRatio = `${probe.naturalWidth} / ${probe.naturalHeight}`;
      box.style.height = 'auto';
    }
  };
  probe.src = imgSrc;
}

function getInputImages(engineId){
  const mainLink = links.find(l=>l.to===engineId && l.toPort==='in');
  const refLink = links.find(l=>l.to===engineId && l.toPort==='ref');
  const mainNode = mainLink ? nodes.find(n=>n.id===mainLink.from) : null;
  const refNode = refLink ? nodes.find(n=>n.id===refLink.from) : null;
  return {main: mainNode?.image || null, ref: refNode?.image || null, mainType: mainNode?.type || null};
}

function findDownstream(engineId, type){
  const l = links.find(x=>x.from===engineId && nodes.find(n=>n.id===x.to && n.type===type));
  return l ? nodes.find(n=>n.id===l.to) : null;
}

async function runUpscale(engineId){
  const engineNode = nodes.find(n=>n.id===engineId);
  if(!engineNode || !engineNode.previewImage){ alert('렌더링된 이미지가 없어.'); return; }

  const apiKey = apiCodeInput.value.trim();
  if(!apiKey){ alert('API 코드를 입력해줘.'); return; }

  const el = document.getElementById(engineId);
  const loading = el.querySelector('.loading');
  const upBtn = el.querySelector('.upscale-btn');
  upBtn.disabled = true;
  loading.style.display = 'block';
  loading.textContent = 'Upscaling...';

  try{
    const upRes = await fetch('/api/upscale', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ apiKey, image: engineNode.previewImage })
    });
    if(!upRes.ok){ alert('업스케일 오류: ' + upRes.status); return; }

    let upData = await upRes.json();
    let attempts = 0;
    while(upData.status && upData.status !== 'succeeded' && upData.status !== 'failed' && attempts < 30){
      loading.textContent = `Upscaling... (${upData.status})`;
      await new Promise(r => setTimeout(r, 2000));
      const pollRes = await fetch('/api/poll', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ apiKey, predictionId: upData.id })
      });
      if(pollRes.ok) upData = await pollRes.json();
      else break;
      attempts++;
    }

    const upscaled = Array.isArray(upData.output) ? upData.output[0] : upData.output;
    if(!upscaled){ alert('업스케일 결과가 없어.'); return; }

    engineNode.previewImage = upscaled;
    const box = el.querySelector('.engine-preview');
    const im  = el.querySelector('.engine-preview img');
    if(im) im.src = upscaled;
    if(box){ box.classList.add('has-image'); applyEnginePreviewAspect(engineNode, upscaled); }
    showPreview(upscaled);
    saveWorkspace();

  } finally {
    upBtn.disabled = false;
    loading.style.display = 'none';
    loading.textContent = 'Rendering...';
  }
}

function resizeImageBase64(base64, maxSize=1536, quality=0.85){
  return new Promise(resolve=>{
    const img = new Image();
    img.onload = ()=>{
      let w = img.naturalWidth, h = img.naturalHeight;
      if(w > maxSize || h > maxSize){
        if(w > h){ h = Math.round(h * maxSize/w); w = maxSize; }
        else { w = Math.round(w * maxSize/h); h = maxSize; }
      }
      const cvs = document.createElement('canvas');
      cvs.width = w; cvs.height = h;
      cvs.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(cvs.toDataURL('image/jpeg', quality));
    };
    img.onerror = ()=> resolve(base64);
    img.src = base64;
  });
}

async function runEngine(engineId){
  const engineNode = nodes.find(n=>n.id===engineId);
  if(!engineNode) return;
  const el = document.getElementById(engineId);
  const loading = el.querySelector('.loading');

  const {main, ref} = getInputImages(engineId);
  if(!main){ alert('이미지를 연결해줘.'); return; }

  const apiKey = apiCodeInput.value.trim();
  if(!apiKey){ alert('API 코드를 입력해줘.'); return; }

  bottomMake.disabled = true;
  loading.style.display = 'block';
  loading.textContent = 'Preparing...';

  // 이미지 리사이즈 (413 방지)
  const mainSmall = await resizeImageBase64(main);
  const refSmall  = ref ? await resizeImageBase64(ref) : null;

  try{
    loading.textContent = 'Rendering...';
    const res = await fetch('/api/render', {
      method: 'POST',
      headers: {'Content-Type': 'application/json; charset=utf-8'},
      body: JSON.stringify({
        apiKey,
        engine: engineNode.engine,
        prompt: String(engineNode.prompt || 'Render this image photorealistically'),
        image: mainSmall,
        refImage: refSmall || null
      })
    });

    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      alert('API 오류: ' + (err.error || res.status));
      return;
    }

    let data = await res.json();

    // 2. Poll if not yet succeeded
    let attempts = 0;
    while(data.status && data.status !== 'succeeded' && data.status !== 'failed' && attempts < 60){
      loading.textContent = `Rendering... (${data.status})`;
      await new Promise(r => setTimeout(r, 2000));
      const pollRes = await fetch('/api/poll', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ apiKey, predictionId: data.id })
      });
      if(pollRes.ok) data = await pollRes.json();
      else break;
      attempts++;
    }

    if(data.status === 'failed'){
      alert('렌더링 실패: ' + (data.error || 'unknown'));
      return;
    }

    let outputImage = Array.isArray(data.output) ? data.output[0] : (data.output || data.image);
    if(!outputImage){ alert('결과 이미지가 없어.'); return; }

    // 3. Show result
    engineNode.previewImage = outputImage;
    const engEl = document.getElementById(engineId);
    if(engEl){
      const box = engEl.querySelector('.engine-preview');
      const im  = engEl.querySelector('.engine-preview img');
      if(im) im.src = outputImage;
      if(box){ box.classList.add('has-image'); applyEnginePreviewAspect(engineNode, outputImage); }
    }
    showPreview(outputImage);
    syncAllEnginePreviews();
    redraw();
    saveWorkspace();

  } finally {
    bottomMake.disabled = false;
    loading.style.display = 'none';
    loading.textContent = 'Rendering...';
  }
}


function getNodePreviewImage(node){
  if(!node) return null;
  if(node.type==='source' || node.type==='result' || node.type==='final') return node.image || null;
  if(node.type==='engine') return node.previewImage || null;
  return null;
}

function selectNode(id){
  selectedNodeId = id || null;
  document.querySelectorAll('.node').forEach(el => el.classList.remove('selected'));
  const node = nodes.find(n=>n.id===id);
  const el = node ? document.getElementById(id) : null;
  if(el) el.classList.add('selected');
  saveWorkspace();
}

function showPreview(src){
  if(!src) return;
  previewImg.src = src;
  previewImg.style.display = 'block';
  previewEmpty.style.display = 'none';
}
function clearPreview(){
  previewImg.src='';
  previewImg.style.display='none';
  previewEmpty.style.display='block';
}

function selectEngine(id){
  selectedEngineId = id;
  const node = nodes.find(n=>n.id===id);
  if(node && node.type==='engine'){
    bottomPrompt.value = node.prompt || '';
    bottomPrompt.disabled = false;
    bottomMake.disabled = false;
  } else {
    bottomPrompt.value = '';
    bottomPrompt.disabled = true;
    bottomMake.disabled = true;
  }
  saveWorkspace();
}

bottomPrompt.addEventListener('input', ()=>{
  if(!selectedEngineId) return;
  const node = nodes.find(n=>n.id===selectedEngineId);
  if(!node || node.type!=='engine') return;
  node.prompt = bottomPrompt.value;
  const el = document.getElementById(selectedEngineId);
  el.querySelector('.prompt').value = node.prompt;
  saveWorkspace();
});

bottomMake.addEventListener('click', ()=>{
  if(selectedEngineId) runEngine(selectedEngineId);
});


sourceLauncher.addEventListener('dblclick', (e)=>{
  e.preventDefault();
  e.stopPropagation();
  if(sourceLauncherDrag && sourceLauncherDrag.moved) return;
  const canvasRect = canvas.getBoundingClientRect();
  const left = parseFloat(world.style.left || '0') || 0;
  const top  = parseFloat(world.style.top  || '0') || 0;
  const cx = (canvasRect.width  / 2 - left) / canvasZoom - 180;
  const cy = (canvasRect.height / 2 - top)  / canvasZoom - 150;
  const n = {id:uid('src_'),type:'source',x:Math.max(0,cx),y:Math.max(0,cy),image:null};
  nodes.push(n);
  renderNode(n);
  selectNode(n.id);
  saveWorkspace();
});

sourceLauncher.addEventListener('mousedown', (e)=>{
  if(e.button !== 0) return;
  const rect = sourceLauncher.getBoundingClientRect();
  sourceLauncherDrag = {
    startX: e.clientX,
    startY: e.clientY,
    left: rect.left,
    top: rect.top,
    moved: false
  };
  e.preventDefault();
});

fileInput.addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file || !pendingUploadNode) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const node = nodes.find(n=>n.id===pendingUploadNode);
    if(!node) return;
    node.image = ev.target.result;
    const el = document.getElementById(node.id);
    el.querySelector('img').src = node.image;
    el.querySelector('.image-box').classList.add('has-image');
    syncAllEnginePreviews();
    selectNode(node.id);
    redraw();
    saveWorkspace();
  };
  reader.readAsDataURL(file);
  e.target.value = '';
});

document.addEventListener('mousedown', e=>{ if(e.button===1) e.preventDefault(); });

// Drag & connect

document.addEventListener('pointermove', e=>{
  if(drag){
    const node = nodes.find(n=>n.id===drag.id);
    const left = parseFloat(world.style.left || '0') || 0;
    const top  = parseFloat(world.style.top  || '0') || 0;
    node.x = (e.clientX - drag.canvasOriginX - left) / canvasZoom - drag.offsetX;
    node.y = (e.clientY - drag.canvasOriginY - top)  / canvasZoom - drag.offsetY;
    const el = document.getElementById(node.id);
    el.style.left = node.x + 'px';
    el.style.top  = node.y + 'px';
    redraw();
  }
  if(connectStart){
    const left = parseFloat(world.style.left || '0') || 0;
    const top  = parseFloat(world.style.top  || '0') || 0;
    const canvasRect = canvas.parentElement.getBoundingClientRect();
    tempMouse = {
      x: (e.clientX - canvasRect.left - left) / canvasZoom,
      y: (e.clientY - canvasRect.top  - top)  / canvasZoom
    };
    redraw();
  }
  if(panMode){
    const dx = e.clientX - panMode.startX;
    const dy = e.clientY - panMode.startY;
    const nextLeft = panMode.originLeft + dx;
    const nextTop = panMode.originTop + dy;
    world.style.left = nextLeft + 'px';
    world.style.top = nextTop + 'px';
  }
  if(sourceLauncherDrag){
    const dx = e.clientX - sourceLauncherDrag.startX;
    const dy = e.clientY - sourceLauncherDrag.startY;
    if(Math.abs(dx) > 3 || Math.abs(dy) > 3) sourceLauncherDrag.moved = true;
    sourceLauncher.style.left = (sourceLauncherDrag.left + dx) + 'px';
    sourceLauncher.style.top = (sourceLauncherDrag.top + dy) + 'px';
  }
});

document.addEventListener('pointerup', (e)=>{
  const launcherDrag = sourceLauncherDrag;
  const changed = !!drag || !!panMode || !!(launcherDrag && launcherDrag.moved);
  if(drag){ const el = document.getElementById(drag.id); if(el) el.classList.remove('dragging'); }
  drag = null;
  panMode = null;
  sourceLauncherDrag = null;
  canvas.classList.remove('panning');
  setTimeout(()=>{
    connectStart = null;
    tempMouse = null;
    redraw();
  }, 0);
  if(changed) saveWorkspace();
});

document.addEventListener('keydown', e=>{
  if((e.key==='Delete' || e.key==='Backspace') && selectedLink){
    removeLink(selectedLink);
  }
});

canvas.addEventListener('mousedown', (e)=>{
  if(e.button === 1){
    e.preventDefault();
    panMode = {
      startX: e.clientX,
      startY: e.clientY,
      originLeft: parseFloat(world.style.left || '0') || 0,
      originTop: parseFloat(world.style.top || '0') || 0
    };
    canvas.classList.add('panning');
  }
});

canvas.addEventListener('auxclick', (e)=>{
  if(e.button === 1) e.preventDefault();
});

canvas.addEventListener('click', ()=>{
  selectedLink = null;
  selectNode(null);
  redraw();
});

// Toolbar

document.getElementById('resetWs').addEventListener('click', ()=>{
  if(!confirm('워크스페이스를 초기화할까요?')) return;
  localStorage.removeItem(LS_WORKSPACE);
  location.reload();
});
document.getElementById('zoomOut').addEventListener('click', ()=> setCanvasZoom(canvasZoom - 0.1));
document.getElementById('zoomIn').addEventListener('click', ()=> setCanvasZoom(canvasZoom + 0.1));
document.getElementById('zoomReset').addEventListener('click', ()=> setCanvasZoom(1));

canvas.addEventListener('wheel', (e)=>{
  e.preventDefault();
  const oldZoom = canvasZoom;
  const step = e.deltaY > 0 ? -0.1 : 0.1;
  const newZoom = Math.max(0.1, Math.min(1.6, Math.round((oldZoom+step)*10)/10));
  const rect = canvas.parentElement.getBoundingClientRect();
  zoomAroundPoint(oldZoom, newZoom, e.clientX - rect.left, e.clientY - rect.top);
}, { passive:false });

function zoomAroundPoint(oldZoom, newZoom, px, py){
  const left = parseFloat(world.style.left||'0')||0;
  const top  = parseFloat(world.style.top ||'0')||0;
  const wx = (px - left) / oldZoom;
  const wy = (py - top)  / oldZoom;
  canvasZoom = newZoom;
  world.style.left = (px - wx * newZoom) + 'px';
  world.style.top  = (py - wy * newZoom) + 'px';
  world.style.transformOrigin = 'top left';
  world.style.transform = `scale(${canvasZoom})`;
  document.getElementById('zoomReset').textContent = Math.round(canvasZoom*100)+'%';
  saveWorkspace();
}

function setCanvasZoom(v){
  const rect = canvas.parentElement.getBoundingClientRect();
  zoomAroundPoint(canvasZoom, Math.max(0.1,Math.min(1.6,Math.round(v*10)/10)), rect.width/2, rect.height/2);
}


function openImagePopup(src, title='Image'){
  if(!src) return;
  const w = window.open('', '_blank', 'noopener,noreferrer,width=1400,height=900');
  if(!w){
    alert('팝업이 차단됐어. 브라우저에서 팝업 허용해줘.');
    return;
  }
  const safeSrc = String(src).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  const safeTitle = String(title).replace(/</g,'&lt;').replace(/>/g,'&gt;');
  w.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>${safeTitle}</title><style>
    html,body{margin:0;width:100%;height:100%;background:#0f0f0f;display:flex;align-items:center;justify-content:center;overflow:hidden}
    img{max-width:100vw;max-height:100vh;object-fit:contain;display:block}
  </style></head><body><img src="${safeSrc}" alt=""></body></html>`);
  w.document.close();
}

// Fullscreen
function toggleFullscreen(src){
  if(fullscreen.classList.contains('on') && fullscreenImg.src===src){ fullscreen.classList.remove('on'); fullscreenImg.src=''; }
  else { fullscreenImg.src = src; fullscreen.classList.add('on'); }
}
fullscreen.addEventListener('click', ()=>{ fullscreen.classList.remove('on'); fullscreenImg.src=''; });
previewBox.addEventListener('click', ()=>{ if(previewImg.src) openImagePopup(previewImg.src, 'Preview'); });

// Initial
restoreWorkspace();

// Always guarantee exactly one engine node
const existingEngines = nodes.filter(n => n.type === 'engine');
if(existingEngines.length === 0){
  addEngineNode();
  const firstEngine = nodes.find(n=>n.type==='engine');
  if(firstEngine){
    selectNode(firstEngine.id);
    selectEngine(firstEngine.id);
  }
  if (typeof sourceLauncher !== 'undefined' && sourceLauncher) {
    sourceLauncher.style.left = '16px';
    sourceLauncher.style.top = '16px';
  }
  setTimeout(()=>{ saveWorkspace(); }, 0);
}
